body:
  text: 日本國現報善惡靈異記中卷或皇臣燒寺流佛像或皇臣建寺弘佛法之中勝寶應眞聖武太上天皇尤造大佛長紹法種刺髮著袈沙受戒修善以正治民慈及動植徳秀千古得一撫運上三靈由此福徳飛空之螯咋芝草葺寺走地之蟻搆金沙建塔法幢高竪而幡足飄八方惠船輕浮以帆影扇九天瑞應之華競而開國邑善惡之報現而示吉凶故號勝寶應眞聖武太上天皇焉爰萬苦惡因連轡苦處善業攀縁引安堺頼頤慈而膝前壞由生愛以頂上棲羽孟甞之七善魯恭之三異蓋斯意之矣然景戒禀性不聰談口不利神鈍遲同於刀連居字不花情心同於至拙黷淨紙謬注口傳愧忝慮顏耳熱庶覯拾文者愧天慙人忍忘事作心之師莫心爲師藉此功徳右腋著福徳之而翔於沖虚之表左脇燭智惠之炬而登於佛性之頂普施群生共成佛道也轡久波弥乎攀堺頼依也頤深也止良羽鳥也孟甞二文人名魯恭二合人名也花音忠反愚也音下反癡也刻編阿无贖計加之愧恥也添顏面也翔仲音仲反保浩也覯見也合示善惡表縁卅二條高徳刑形死縁第一見烏邪婬厭世修善縁第二惡逆子愛妻將殺母謀現被惡死縁第三力女桶力試縁第四依漢神祟殺牛七頭又修放生善以現得善惡報縁第五至誠心奉寫法花經有驗示異事縁第六智者誹妬變化聖人而現至閻羅闕受地獄苦縁第七贖蟹蝦命放生得現報縁第八己作寺用其寺物作牛役之縁第九常鳥卵煮食以得惡死報縁第十罵僧與邪婬得惡病而死縁第十一贖蝦蟹命放生現報蟹所助縁第十二生愛欲戀吉祥天女像感應示奇表縁第十三窮女王歸敬吉祥天女像得現報縁第十四奉寫法花經因供養顯母作牛之因縁第十五依不布施與放生而現得善惡報縁第十六觀音銅像反化形示奇表縁第十七呰誦持法花經僧而現口斜得惡死報縁第十八憶持心經之女現至閻羅王闕示奇表縁第十九依惡夢至誠心使誦經示奇表得現全縁第廿攝神王放光示奇得報縁第廿一佛銅像盜人所捕示靈表顯盜人縁廿二彌勒菩薩銅像盜人所捕示靈表顯盜人縁第廿三閻羅王使鬼得所召人之賂以免縁第廿四閻羅王使鬼受所召人之饗而報恩縁第廿五木作畢所棄佛像木示異靈縁第廿六力女示強力縁第廿七極窮女於釋迦丈六佛願福分示奇表以現得大福縁第廿八行基大徳放天眼視女人頭塗猪油而呵嘖縁第廿九行基大徳女人携子視過去怨令投淵示異表縁第卅將建塔發願時生女子捲舍利所産縁卅一貸用寺息利酒不償死作牛役之償績第卅二女人惡鬼見點被食縁第卅三孤孃女憑敬觀音銅像示奇表得現報縁第卅四打法師以現得惡病而死縁第卅五觀音像示神力縁第卅六觀音木像不燒火難示威神力縁卅七因慳貪成大蛇縁第卅八藥師佛木像流水埋砂示靈表縁第卅九好於惡事者以現所誅利鋭得惡死報縁第四十女人大蛇所婚頼藥力得全命縁第四十一極窮女憑敬千手觀音像願福分以現得大福縁第四十二恃己高徳刑賎形沙彌以現得惡死縁第一諾樂宮御宇大八嶋國勝寶應眞聖武太上天皇發大誓願以天平元年己巳春二月八日於左京元興寺備大法會供養三寶勅太政大臣正二位長屋親王而任於供衆僧之司時有一沙彌濫就供養之處捧受飯親王見之以牙册以罰沙彌之頭破流血沙彌摩頭捫血哭而忽不覲所去不知時法會衆道俗偸之言凶之善矣逕之二日有嫉妬人讒天皇奏長屋謀傾社稷將奪國位受天心瞋怒遣軍兵陳之親王自念无罪而被囚執此決定死爲他刑殺不如自死即其子孫令服毒藥而絞死畢後親王服藥而自害天皇勅捨彼屍骸於城之外而燒未散所擲海唯親王骨流于土左國時其國百姓多死云百姓患之而解官言依親王氣國内百姓可皆死亡天皇聞之爲近皇都置于紀伊國海部郡椒抄奧嶋嗚呼惆哉福貴熾之時高名雖振華裔而妖交窘之日无所婦唯一旦滅也誠知怙自高徳刑彼沙彌護法善神嫌著袈裟之類雖賎形不應不恐隱身聖人交其中故慢經云先生位上人尺迦牟尼佛頂佩履踟人等罪云何況著袈裟之人打侮之者其罪甚深矣濫母册尺乎摩捫佐支弖嫉妬二合囚止良波留屍骸二合死都妖災也窘見烏邪淫厭世修善縁第二禪師信嚴者和泉國泉郡大領血沼縣主倭麻呂也聖武天皇御世人也此大領家之門有大樹烏作巣産兒抱之而臥雄烏遐迩飛行求食養抱兒之妻求食行之頃他烏遞來而婚婚今夫就心共高空指於北而飛棄兒不于時先夫烏食物哺持來見之无妻烏于時慈兒抱之而臥不求食物而經數日大領見之使人登樹見其巣抱兒而死大領見之大悲改心視烏邪婬厭世出家離妻子捨官位隨行基大徳修善求道名曰信嚴但要語曰與大徳倶死必當同往生西方大領之妻亦血沼縣主大領捨之者終无他心愼貞潔爰男子得病臨命終時而白母言飮母乳者應延我命母隨子言乳令飮病子子飮而歎之言噫乎捨母甜乳而我死哉即命終焉然大領之妻戀於死子同共出家修習善法信嚴禪師无幸少縁自行基大徳先命終也大徳哭詠作歌曰加良須止伊布於保乎蘇止利能去止乎能米止母爾止伊比天佐岐陀智伊奴留夫將大炬時先備蘭松將雨降時兼潤石坂示烏鄙事領發道心先善方便見苦悟道者其斯謂之矣欲界雜類鄙行如是厭者背之愚者貪之贊曰可哉血沼縣主氏瞰烏邪婬厭俗塵背浮花假趣常淨身勤修善祈惠命心尅安養期解脱是世間異秀厭土者也沼川奴遐迩近也遞婚都流夫可陀弥數此万多噫阿甜阿万支詠鄙乃比加南流可阿古志阿留可奈貪瞰見也尅引也望也秀勝也須久礼尓多留又云備伊弖尓多流惡逆子愛妻將殺母謀現報被惡死縁第三吉志火麻呂者武藏國多麻郡鴨里人也火麻呂之母者早部眞也聖武天皇御世火麻呂大伴名姓不分明筑紫前守所點應經三年母隨子往而相節養其婦者留國守家時火麻呂離己妻去不昇妻愛而發逆謀思殺我母遭其喪服免役而還與妻倶居母之自性行善爲心子語母言東方山中七日奉説法花經有大會率母聞之母所欺念將聞經發心洗湯淨身倶至山中以牛目眦母而言汝地長跪母瞻子面答之曰何故然言若汝託鬼耶子拔横刀將殺母即子前長跪而言殖木之志爲得彼菓並隱其影養子之志爲得子力被子養如恃樹漏雨何吾子違思今在異心耶子遂不聽時母侘著身脱衣置於三處子前長跪遺言而言爲我詠裹以一衣者我兄男汝得之也一衣者贈我中男也一衣者贈我弟男也逆子歩前將殺母項之裂地而陷母即起前抱陷子髮仰天哭願吾子者託物爲事非實現心願免罪猶取髮留子終陷也慈母持髮歸家爲子備法事其髮入筥置佛像前謹請諷誦矣母慈深深故於惡逆子垂哀愍心爲其修善誠知不孝罪報甚近惡逆之罪非無無彼報矣節加岐眦率侘二合陷給也力女力試縁第四聖武天皇御世三野國片縣郡少川市有万女爲人大也名爲三野狐是昔三野國狐爲母生人之四繼孫也力強當百人力住少川市内恃己力凌弊於往還商人而取其物爲業時尾張國愛智群片輪里有万女爲人少也是昔有元興寺道場法師之孫也其聞三野狐凌弊於人物而取念試之蛤桶五十解載船泊彼市也亦儲備副納熊葛練韃廿段時狐來彼蛤皆取令賣然問之言自何來女蛤主不答亦問不答重四遍問乃答之言來方不知狐念无禮打起依即二手待捉葛韃以一遍打韃著肉亦取一韃一遍打韃著肉十段韃隨打皆著肉狐白之言服也犯也惶也於是知盍於狐之力也蛤主女言自今已後在此市不得若強住者終打殺也狐所打不住其市不奪人物彼市人惣皆悦安穩夫力人繼世不絶誠知先世殖大力因今得此力矣桶久良倍之韃幣師倍太計比曾米縁持也依漢神祟殺牛而祭又修放生善以現得善惡報縁第五攝津國東生郡撫凹村有一富家長公姓名未詳也聖武太上天皇之世彼家長依漢神祟而祷之祀限于七年毎年殺祀之以一牛合殺七頭七年祭畢忽得重病又逕七年間醫藥方療猶不愈喚集者而祓祈祷亦彌病於思之我得重病由殺生業故自臥病年已來毎月不闕六節受齋戒修放生業見他殺貪生之類不論而贖又遣八方買生物而放迄七年臨命終時語妻子曰我死之後十九日置之莫燒妻子置之猶待期日唯歴九日還蘇而語有七人非人牛頭人身我髮繋繩捉之衞往見之前路有樓閣宮門是何宮非人惡眼睚眦而逼之言急往入于宮門而白召之吾自知之閻羅王也王問言斯是殺汝之讎答曰當是則膾机與少刀持出自急判許加殺我賊膾而之時千萬餘人勃然出來解縛繩曰非此人咎所祟鬼神爲祀殺害爰余居中而七非人與千萬餘人毎日訴諍如水火閻羅王判斷之不定是非人猶強白言明知是人作主截我四足祀廟乞利賊食肴今如切倪猶欲屠啗千萬餘亦白王曰我等委曲知非此人咎識鬼神咎王自思惟理就多證經八日已其夕告詔參向明日奉詔而罷九日集會閻羅王即告之言大分理判由多數證故就多數判許已訖七牛聞之甞舌飮唾切膾爲效宍爲效慷慨捧力而建各言不報怨哉我當不忘獨後報之千萬餘人衞繞於我左右前後自王宮出乘擧而荷幡而導讚嘆以送長跪禮拜彼衆人皆作一色容爰吾問曰仁者誰人若我等是汝買放生不忘彼恩故今報耳自閻羅闕還甦發誓願從此已後效不祀神歸信三寶己家立幢成寺安佛修法放生從此已後號曰那天堂矣終无病春秋九十餘歳而死也如鼻李那經説迦留陀夷昔作天祀主由殺一羊今雖作羅漢而後得怨報於婆羅門之妻所殺云如最勝王經説流水長者放十千魚生天上以卅千珠現報流水長者其斯謂之矣祟凹祷愈万愛祓波浪遍祈美訪問也頭末也樓閣多加度野睚眥二合膾勃然二合忽也截支里天希倪屠佐加知天啗食也委曲二合波比良計苦甞效万弥乎慷慨至誠心奉寫法華經有驗示異事縁第六聖武天皇御代山背國相樂郡有發願人姓名未祥也爲報四恩奉寫法花經爲納大乘遣使四方求白檀紫壇乃得諾樂京以錢百貫而買喚工巧人規令造函以奉納經長函短納經不得檀越大悔又訪无由故發誓願依經作法屈請衆僧限三七日悔過哭曰亦令得未歴二七日請經試納函自少延垂不得納檀越加精進悔過歴三七日納乃得納於是奇異疑思若經短矣若函若延函矣即清本經與新經以均量之猶不失誠知示於大乘不思議力試于願主至深信心更不可疑也智者誹妬變化聖人而現至閻羅闕受地獄苦縁第七釋智光者河内國人其安宿郡鋤田寺之沙門也俗姓鋤田速後改姓上村主也母氏飛鳥部造也天年聽明智惠第一製盂蘭大般若心般若等經疏爲諸學生讀傳佛教時有沙彌行基俗姓越史也越後國頚城郡人也母和泉國大鳥郡人蜂田藥師也捨俗離欲弘法化迷器宇聰敏自然生知内密菩薩儀外現聲聞形聖武天皇感於威徳故重信之時人欽貴美稱菩薩以天平十六年甲申冬十一月任大僧正於是智光法師發嫉妬之心而非之曰吾是智人行基是沙彌何故天皇不齒吾智唯譽沙彌而用焉恨時罷鋤田寺而住得痢病經一月許臨命終時誡弟子曰我死莫燒九日一日置而待學生問我答之應曰有縁東西而留供養愼勿知他弟子受教閉師室戸不令知他而竊涕泣晝夜護闕唯待期日學生問求如遺言答留供養也時閻羅王使二人來召於光師向西而往見之前路有金樓閣問是何宮答曰於葦原國名聞智者何故不知當知行基菩薩將來生之宮其門左右立二神人身著鎧額著緋蘰使長跪白之曰召也問曰是有於豐葦原水穗國所謂智光法師矣智光答白唯然即指北方曰從此道將往制使歩前不見大非日光甚熱之氣當身炙面雖極熱惱而心欲近就問何是熱答爲煎汝地獄熱氣往前極熱鐵柱立之使曰抱柱光就抱柱肉皆銷爛唯骨存歴之三日使以弊箒撫於其柱而言活如故身生又指北將往倍勝於先熱銅柱立極熱之柱而所引惡猶就欲抱言抱之即就抱之身皆爛銷逕之三日如先撫柱而言活如故更生又指北而往甚熱火氣如雲霞而從空飛鳥當於熱氣而落煎之問是何處答爲師煎熬何鼻地獄即至執師燒入燒煎唯聞打鍾音時冷乃憩逕之三日叩地獄邊而言活如本復生更將還來至金字門如先白言將還來之在于宮門二人告言召師因縁有葦原國誹謗行基菩薩爲滅其罪故請召耳彼菩薩化葦原國已將生此宮今垂來時故待候也愼黄竃火物莫食今者忽還與使倶向東還來即見之頃准逕九日蘇喚弟子弟子聞音集會哭喜智光大歎向弟子具述閻羅状大懼念言向於大徳擧誹妬心時行基菩薩有難波令渡椅堀江造船津光身漸息往菩薩所菩薩見之即以神通知光所念含嘆愛言何罕面奉光發露懺悔曰智光於菩薩所致誹妬心而作是言光者古徳大僧加以智光生行基沙彌者淺識之人不受具戒何故天皇唯譽行基捨智光也由口業罪閻羅王召我今抱於鐵銅柱經之九日償誹謗罪恐至餘罪於後生世是以慙愧發露當願免罪行基大徳和顏然亦更白見大徳生處以黄金造宮行基聞之言歡矣貴哉誠知口傷身之災門舌剪善之銛鉞所以不思議光菩薩經云饒財菩薩説賢天菩薩過故九十一却常墮婬女腹中生已葉之爲狐狼所食其斯謂之矣從此已來智光法師信行基菩薩明知聖人然菩薩感機盡縁以天平廿一年乙丑春二月二日丁酉時法儀捨生馬山慈神遷彼金宮也智光大徳弘法傳教化迷趣正以白壁天皇卅智嚢蛻日本地奇神遷不知堺矣贖蟹蝦命放生得現報縁第八置染臣鯛女者奈良京富尼寺上座尼法迩之女也道心純熟初婬不犯常懃採菜一日不闕奉供侍於行基大徳入山採菜見之大蛇飮乎大蝦誂大蛇曰是蝦免我不免猶飮亦誂之曰我作汝妻故幸免吾大蛇聞之高捧頭而瞻女面吐蝦而放女期蛇曰自今日經七日而來然到期日閉屋塞穴竪身居内誠如期來以尾拍壁女恐明日白於大徳大徳住在生馬山寺而告之言汝不得免唯竪受戒乃全受持三歸五戒然還來道不知老人以大蟹而逢問之誰老乞蟹免吾老答我攝津國兎原郡人畫問迩麻呂年七十八而无子息活命无使往於難波偶得此蟹但有期人故汝不免女脱衣贖猶不免可復裳贖老乃免之然蟹持更返勸請大徳咒願而放大徳歎言貴哉善哉彼八日之夜又其蛇來登於屋頂拔草而入女悚慓焉唯床前有跳之音明日見之有一大蟹而彼大蛇條然段切乃知贖放蟹報恩矣受戒之力也欲知虚實問于耆宛姓名遂无定委耆是聖化也斯奇異之事也己作寺用其寺物作牛役縁第九大伴赤麻呂者武藏國多磨郡大領也以天平勝寶元年己丑冬十二月十九日死以二年庚寅夏五月七日生黒斑犢自負碑文矣探之斑文謂赤麻呂者檀於己所造寺而隨恣心借用寺物未報納之死亡焉爲償此物故受牛身者也於諸眷屬及同僚發慚愧心而慓无極謂作罪可恐豈應无報矣此事可報季業楷模故以同年六月一日傳乎諸人矣冀无慚愧者覽乎斯録改心行善寛飢苦所迫雖欽銅湯而不食寺物古人説曰現在甘露未來鐵丸者其斯謂之歟誠知非无因果不怖愼歟所以大集經云盜僧物者罪過五逆云探檀慓恐也楷摸二合加多岐季末葉世也賢見也迫世无諺去砥和左尓常鳥卵煮食以現得惡死報縁第十和泉國和泉郡下痛脚村有一中男姓名未詳也天年邪見不信因果常求鳥卵煮食爲業天平勝寶六年甲午春三月不知兵士來告中男言國司召也見兵士腰負四尺於即副共往纔至郡内於山直里押入麥畠一町餘麥生二尺許眼見火踐足无間走廻畠内而叫哭曰熱哉時有當村人入山拾薪見於走轉哭叫之人自山下來執之而引拒不所引猶強追捉乃從籬之外事之而出地而臥然不曰良久蘇起然病叫言痛足矣云山人問言何故然也答曰有一兵士召我將來押入火燒足如煮見四方者皆衞火山無間所出故叫走廻山人聞之塞袴見膊肉爛銷其骨在准逕之一日而死也誠知地獄現在應信因果不可如烏烏慈己兒而食他兒無慈悲者雖人如烏矣涅槃經云雖得人數尊卑差別寶命重死二倶无異云善惡因果經云今身燒煮鷄子死墮灰河地獄者其謂之矣脚阿志杜布牟太纔比太於紀籬岐太市礼奴然二合二古耳奈良久二合蘇搴可岐阿波支乎寶貴也罵僧與邪婬得惡病而死縁第十一聖武天皇御世紀伊國伊刀郡桑原之狹屋寺尼等發願於彼寺備法事請奈良右京藥師寺僧題惠禪師字曰依網禪師俗姓依連故以爲字奉仕十一面觀音悔過時彼里有一凶人姓文忌寸也字云上田三郎矣天骨邪見不信三寶凶人之妻有上毛野公大掃之女一日一夜受八齋戒參行悔過居於衆中夫從外歸家而見無妻問家人答曰參往悔過聞之瞋怒即往喚妻導師見之宣義教化不信受曰爲無用語汝婚吾妻頭可所罰破斯下法師矣惡口多言具不得述喚妻歸家即犯其卒爾著蟻爵痛死雖不加刑而發惡心濫罵令恥不恐邪婬故得現報也口生百舌雖萬言白愼莫誹僧蒙交故也婚天骨二合比止那利斯下二合賎万良嚼可弥倏贖蟹蝦命放生現報蟹所助縁第十二山背國紀伊郡部内有一女人姓名未詳也天年慈心信因果受持五戒十善不殺生物聖武天皇代彼里牧牛村童山川蟹取八而將燒食是女見之勸牧牛白幸願此蟹免我童男辭不聽曰猶燒慇誂乞脱衣而買童男等乃免之勸請義禪師令咒願以放生然後入山見之大蛇飮於大蝦大蛇言是蝦是蝦免我賂奉多弊帛蛇不聽吝女募弊帛而擣之曰汝爲神祀幸乞免我不聽猶飮又語蛇言替此蝦以吾爲妻故乞免我蛇乃聽之高捧頭頚以瞻女面吐蝦而放女期蛇言自今日經七日而來然白父母具陳蛇状父母愁言汝了唯一子何誑託故作不能語時行基大徳有紀伊郡深長寺往白事状大徳同曰烏呼難量之語唯能信三寶耳奉教歸家當期日之夜閉屋堅身種發願以信三寶蛇繞屋蜿轉腹行以尾打壁發於屋頂咋草拔開落於女前雖然蛇不就女身唯有爆音如跳齧明日見之大蟹八集彼蛇條然揃段切之乃知贖放蟹報恩矣无悟之虫猶受恩返報恩豈人應忘恩歟自此已後山背背國貴乎山川大蟹爲善放生也生愛欲戀吉祥天女像感應示奇表縁第十三和泉國泉郡血渟山寺有吉祥天女像聖武天皇御世信濃國優婆塞來住於其山寺睇之天女像而生愛欲繋心戀之毎六時願如天女容好女賜我優婆塞夢見婚天女像明日瞻之彼像裙腰不淨染行者視之而慚愧言我願似女何忝天女專自交之愧不語他人弟子偸聞之後其弟子於師無禮故嘖擯去所擯出里師程事里人聞之往問虚實並瞻彼像淫精染優婆塞不得隱事而具陳諒語委深信之者无感不應也是奇異事矣如涅槃經云多婬之人盡女生欲者其斯謂之矣睇弥甲反容瞻見也又云万波礼波添擯程諒万去止尓委知也裙母乃窮女王歸敬吉祥天女像得現報縁第十四聖武天皇御世王宗廿三人結同心次第爲食設備宴樂有一窮女入宴衆列廿二王以次第設宴樂已訖但此女王獨未設食備食無便大恥貧報至于諾樂左京服部堂對面吉祥天女像而哭之曰我先世殖貧窮之因今受窮報我牙爲食入於宴會徒人物設食無便願我賜財于時其女王之兒走來白母曰快從故京備食而來母王聞之走到見之養王乳母談之曰我聞得客故具食來其飮食蘭美味芬馥無比無等無不具足物設器皆使荷之人卅人也王衆皆來受饗以喜其食倍先王衆讚稱富王不然何貧敢能餘溢飽盈佐我先設歌奇異如鈞天樂或脱衣以與或脱裳以與或送錢絹布綿等不勝悦望捧得衣裳著之乳母然後參堂將拜尊像著之乳母衣裳被之其天女像疑之而往問之乳母答之不知定知菩薩感應所賜因大富財免貧窮愁是奇異之事矣快溢鋺佐奉寫法華經因供養顯母作女牛之因縁第十五高橋連東人者伊勢國山田郡代里人也大富饒財奉爲母寫法華經以盟之曰請於我願有縁之師欲所濟度嚴法會訖將供明日而試使曰値第一以爲我縁師有修法状不過必請其使隨願出門試往至於同郡御谷之里見有乞者鉢嚢懸肘醉酒臥洛姓名未詳有伎戲人剃髮懸繩以爲袈裟雖爲然猶曾不覺知使見起禮勸請歸家願主見之信心敬禮一日一夜家内隱居頓作法服以之奉施爰乞者問之所以者何答曰請令講法花經乞者我无所學唯誦持般若陀羅尼乞食活命願主猶請乞者思議不如竊逃兼心知逃副人令守彼夜請師夢見赤來至告言我此家長公母也是家牛中有赤牝牛其兒吾也我昔先世偸用子物所以今受牛身以償其債明日爲我將説大乘之師故貴而慇告知欲知虚實説法堂裏爲我敷座我當上居請師自夢驚醒心内大怪明朝登講座言我无所覺隨願主心故登此座唯有夢悟具陳夢状檀主聞起敷座喚牝伏座於是檀主大哭言實我母我曾不知今我奉免牛聞大息法事訖後其牛即死法會之衆悉皆號哭響于堂庭往古已後莫過斯奇更爲其母重修功徳諒知願主顧母恩至深之信乞者誦神咒積功之驗也依不布施與放生而現得善惡報縁第十六聖武天皇御代讚岐國香川郡坂田里有一富人夫妻同姓綾君也隣有耆嫗各居鰥寡曾无子息極窮裸衣不能活命綾君之家爲所乞食日不闕鋪時而逢主將試之而毎夜半竊起爨令食於家口猶來相之合家怪之家室告家長曰此二耆嫗駈仗非便我慈悲故入家兒數長聞之曰採飯而養自今已後各缺自分施彼耆嫗功徳之中割自身宍施他赦命最上之行今我所作稱彼功徳家口應語折分飯而養彼家口中有一使人不隨主語厭於耆姥漸使人又厭不施家室竊分飯而養常之人讒長公曰缺使人分育耆嫗故飯尠少飢疲之者不能營農令懈産説之不輟猶送於養説之家口副置釣人入海經釣繩集著十貝而上誂釣主曰此欲贖釣主不免呵至心教化之言能人作寺何甚不脱乃脱之言充十具京欲米五斗如乞而贖勸請法師令咒願放之於海放生之人與使人倶入山拾薪登于枯松脱之落死託卜者曰我身莫燒七日置之隨卜者語自山荷出置之於外唯待期日七日乃蘇語妻子言法師五人有前而行優婆塞五人有後而行路廣平直如墨繩其路左右立烈寶幡前有金宮問之何宮優婆塞睇諍曰斯汝家主將生之宮養於耆嫗因此功徳爲作是宮汝知我耶答不知也教曰當知十人法師優婆塞者汝贖放之十具也宮門左右有額生一角之人捧大力爲殺於吾頚法師優婆塞諌之不令戮門左右備蘭饌諸人樂食吾居于中七日飢渇自口出焔然言汝不施飢耆嫗而厭罪報也法師優婆塞將吾而還纔見乃蘇是人觀之湶状好施放生贖命之報者返救不施之報者返令飢渇矣非无善惡之報也嫗於于那鰥乎乃古夜母息于万古鋪計右止爨家室二合家刀自操取也姥尠析岐弖營産業輟河支脱松脱睇戮支羅志乎受焔翼助也湶世弥觀音銅像及鷺形示奇表縁第十七大倭國平群郡鵤村岡本居寺觀音銅像有十二體昔少墾田宮御宇天皇卅上宮皇太子所准宮也大子發誓願以宮成尼寺者也聖武天皇世彼銅像六體盜人所取尋求无得經數日月平群驛西方有少池夏六月彼邊有牧牛童男等見之池中有聊木頭上居鷺牧牛見彼居鷺拾集礫塊以之擲打不避猶居擲拍疲懈下池取鷺垂將捕之即入於水見所居木有金之指取牽上見觀音銅像頼觀音像名菩薩池牧牛童男告知諸人轉聞告知寺尼等聞來見實其像也塗金褫落居衆術繞彼像而悲哭云我失尊像日夜奉戀今邂逅而逢而逢我諸大師何有罪過蒙斯賊難然嚴擧安像以奉請寺道俗集言鑄錢盜取用无便思煩而棄定知彼見者非現實觀音變化更莫疑也如涅槃經説雖佛滅後法身常在者其斯謂之矣礫塊現拍打也垂伊万弖號音大伊阿波計頼依也鑄伊呰讀法花經僧而現口斜得惡死報縁第十八去天平年中山背國相樂郡部内有一白衣姓名未詳也同郡高麗寺僧榮常之誦持法花經彼白衣與僧居其寺暫間作碁僧作碁條言榮常師之碁手平毎遍之言白衣呰僧故戻己曰放言而曰榮常師碁手乎如是重不止猶效爰奄然白衣口斜恐以手押出寺而去程不遠擧身地頓命終矣見聞人云雖不加刑呰心放言口斜忽然而死何況發怨讎心加刑罰矣法花經云賢僧與愚僧不得居同位又長髮比丘者白衣不剃髮鬢而賢也同位同器而不得用若強位者銅炭上居鐵丸答墮地獄者其斯謂之矣斜二合戻炭憶持心經女現主閻羅王闕示奇表縁第十九利苅優婆夷者河内國人也姓利苅村主故以爲宗天年澄情信敬三寶常誦持心經以爲業行誦心經之音甚微妙爲諸道俗所愛樂也聖武天皇御世是優婆夷夜寢不病卒爾而死到閻羅王所時王見之而起立床敷蓐居之語曰傳聆能誦心經我欲聽聲暫頃耳願誦聞之即誦王聞隨喜從坐而起長跪拜曰貴哉當知聞有逕之三日告今還自王宮出門有三人著之黄衣値優婆夷而歡喜曰唯瞥所覲此頃不故吾戀思何偶今達往矣速還我從今日經于三日諾樂京東市中必逢別還纔見更甦之也至三日朝猶故欲往京之東市往居市中而終日待人不來但賎人從市東之門而入市中賣經衒賣以告之言誰經買乎優婆夷前遮歴而過從市西門而出往也優婆夷欲買彼經遣使而還開經見之彼優婆夷昔時奉寫梵網經二卷心經一卷也未供而失逕之多年求諮不得心内歡喜知盜人猶忍問經直欲幾何答別卷直欲錢五百文隨乞而買於是乃知逢期三人者今即是經三養也設會講讀信因果慇懃誦持晝夜不息噫呼奇哉如涅槃經云若見有修行善者名見天人修行惡者名見地獄者其斯謂之矣蓐尓口暫頃勿弊止未比頃偶多眞佐可尓衒弖良波吉弖諮問幾何慇祢母呂尓懃都止米弖依惡夢至誠心使誦經示奇表得全命縁第廿大和國添上郡山村里有一長母姓名未詳也彼母有女嫁生二子聟官遣縣主宰因率妻子至所任國經歳餘也但妻之母留土守家爲女夢見惡瑞相即驚恐念爲女誦經而依貧家不得敢之不勝心念脱自著衣洗淨以爲奉誦經然凶夢相復猶重現母心恐復脱著裳淨洒以爲如先誦經女在任縣國司館所生子遊館庭中母屋裏裏二子見有七僧坐乎居屋上而讀經也二子白母言屋上在七躯法師而讀經矣出應見彼讀經音如蜂集鳴母聞之怪起後屋出即當居處之壁仆也亦七法師忽然不見女大恐怪自内心念天地助吾不壓於壁後守家母遣使到問陳凶夢状傳讀經事女聞母傳状大怖通心信三寶乃知誦經之力三寶護念也攝神王放光示奇表得現報縁第廿一諾樂京東山有一寺號曰金鷲優婆塞住斯山寺故以爲字今成東大寺未造大寺時聖武天皇御世金鷲以行者常住修道其山寺居一執金剛神像矣行者神王繋繩引之願晝夜不憩時從放光至于皇殿天皇驚怪遣使看之勅信尋光至寺見有一優婆塞引於繋彼神之繩禮佛悔過信視還以状奏之召行者詔欲求何事答曰欲出家修學佛法勅許得度金鷲爲名譽彼行供四事無乏時世之人美讚其行稱金鷲菩薩矣彼放光之執金剛神像今東大寺於羂索堂北戸而立也贊曰善哉金鷲行者信燧攅東春熟火炬西秋光感火人皇愼驗瑞誠知願無不得者其斯謂矣憩燧備乎攅岐里又母三瑞印也罷音券反繩也佛銅像盜人所捕示靈表顯盜人縁第廿二和泉國日根郡部内有一盜人住道路邊姓名未詳也天年心曲殺盜爲業不信因果常盜寺銅作帶衒賣聖武天皇御世其部盡惠寺佛盜人所取時有路往人從寺北路乘馬而往聞之有聲而叫哭曰痛哉痛哉人聞思諌不令打馬疾前隨近叫音漸失不叫留馬聞之唯有鍛音所以前馬過往隨却如先復呻也不得忍過故更還來叫音復止而有鍛音疑若殺人必有異心良久徘徊竊入從者窺看屋内奉仰佛銅像剔缺手足以錠頚即捕打問何寺佛像答盡惠寺之佛像也遣使問之實所盜矣使者擧語而具述状僧並檀越聞之集來衞於破佛而號愁曰哀哉悲哉我大師聊何有過失蒙此賊難尊像有寺以像爲師今自滅後以何爲師矣衆僧嚴擧安置損佛哭殯於寺彼盜人不刑罰而捨路人繋之以送于官閉囚囹圄定知聖輟甚惡而示是瑞至誠應懼非无聖靈涅槃經十二卷文如佛説我心重大乘聞婆羅門誹謗方等斷其命根以是因縁從是來不墮地獄又彼經卅三卷云一闡提輩永斷滅故以是義故殺害蟻子猶得殺罪殺一闡提無有殺罪者其斯謂之矣此人者誹謗佛法僧爲衆生不説法無恩義故殺无罪者也叫走也鍛呻尓与剔木里錠多加尓記留懇囚利阿倍天岐囹固二合彌勒菩薩銅像盜人所捕示靈表顯盜人縁第廿三聖武天皇御世勅信巡夜行於京中其半夜時其諾樂京葛木居寺前南慕原有哭叫音言痛哉勅信聞之馳陳見之盜人捕彌勒菩薩銅像以石破之打捉問之答之白曰葛木尼寺銅像也此像置寺然彼盜人送之於官聞因囹圄焉夫理法身佛非血肉身何有所痛唯所以示常住不變也是亦奇異之事也勅信使也巡陳閻羅王使鬼得所召人之賂以免縁第廿四楢磐鳴者諾樂左京六條五坊人也居住于大安寺之西里聖武天皇世借其大安寺修多羅分錢卅貫以往於越前之都魯鹿津而交易以之運超載船將來家之將忽然得病思留船軍獨來家借馬乘來至于近江高嶋郡磯鹿辛前而之者三人追來後程一町許至于山代宇治埼之時近追附共副往磐嶋問之何往人耶答言曰閻羅王闕召於猶磐嶋之往使也磐嶋聞問見召者我也何故召耶使鬼答言我等先往汝家而問之答曰商往未來故至於津而求當相欲投者有四王使誹言可免受寺交易錢而奉商故暫免耳召汝累日而我飢疲若有食物耶磐嶋云唯有干飯與之令食使鬼云汝病我氣故不依近而但莫恐終望於家備食饗之鬼云我者牛宍味故牛宍饗捕牛鬼者我也磐嶋云我家有斑牛二頭以之進故唯免我也鬼言我今汝物多得食其恩幸故今免汝者我入重罪持鐵杖應所打百段若有與汝同年之人耶磐嶋答言我都不知三鬼之中一鬼議言汝何年耶磐嶋答云我年代寅也鬼云吾聞率川社許相八卦讀與汝同有戊寅年人宜汝替者召將彼人唯汝饗受牛一頭也爲令脱我所打之罪呼我三名奉讀金剛般若經百卷一名高佐麻呂二名中知麻呂三名槌麻呂夜半出玄明日見之牛一死也磐嶋參入大安寺南塔院請沙彌仁耀法師未受戒之時也語欲奉讀金剛般若經百卷仁耀受請經二箇日讀金剛般若經百卷説歴三箇日使鬼來云依大乘力脱百段罪自常食復倍飯一斗而賜喜貴自今以後毎節爲我修福供養即忽然失磐嶋年九十餘歳而死大唐徳玄被般若力脱閻罪王使所召之難日本磐嶋受寺商錢脱閻羅王使鬼追召之難也賣瓜女人生利天供毒掬多返生善心者其斯謂之矣閻羅王使鬼受所召人之饗而報恩縁第廿五讚岐國山田郡有布敷臣衣女聖武天皇代衣女忽得病時偉備百味祭門左右賂於疫神而饗之也閻羅王使鬼來召衣女其鬼走疲見祭食就而受之鬼語衣女言我受汝饗故報汝息若有同姓同名人耶衣女答言同國鵜垂郡有同姓衣女鬼率衣女往於鵜垂郡衣女之家而對面即從緋嚢出一尺鑿而打立額即召時去彼山田郡衣女歸家也時閻羅王待授之言此非召衣女誤召也然暫此留往召山田郡衣女鬼不得荐召山田郡衣女而將來也閻羅王待見而言當是召衣女也往彼鵜垂郡衣女者歸家經三日頃燒失鵜垂郡衣女之身矣更還愁於閻羅王白失體无依時王問言有山田郡衣女之體耶答言有之王言得其爲汝之身因爲鵜垂郡衣女之身而甦即言此非我家有鵜垂郡父母言汝者我子也何故然言耶衣女猶不聽往於鵜垂郡衣女之家言當此我家也其父母言汝非我子我子燒滅於此衣女貝陣閻羅王詔状時彼二郡父母聞之諾信以二家財許可付屬故現在衣女得四父母得二家寶矣備饗賂鬼此非功虚糺有物者猶可賂饗是亦奇異事矣偉疲都加礼尓弖於母祢利弖鵜于此鳥名也卒爲弖緋嚢布久呂鑿設阿夜知弖荐諾囑未作畢佛像而棄木示異靈表縁第廿六禪師廣達者俗姓下毛野朝臣上總國武射郡人一云畔蒜郡人也聖武天皇代廣達入於吉野金峯經行樹下而求佛道時吉野郡桃花里有椅本伐梨引置之而歴歳餘同處有河名曰秋河彼引置梨度于是河人畜倶踐而度往還廣達有縁出里度彼椅往椅下有音曰嗚呼莫痛踰耶禪師聞之怪見无人良久徘徊不得忍過就椅起看未造佛了而棄木也禪師大恐引置淨處哀哭敬禮發誓願言有因縁故遇我必奉造請有縁處勸人集物雕造阿彌陀佛彌勒佛勸音菩薩等像既訖今居置吉野郡越部村之岡堂也木是无心何而出聲唯聖靈示更不應疑也畔阿蒜桃于都川支有椅下云土知乃木椅下上云波止踰不牟土雕惠力女示強力縁第廿七尾張宿禰久玖利者尾張國中嶋郡大領聖武天皇食國之時人也久玖利之妻有同國愛知郡片里之女人是昔有元興寺道場法師之孫也隨夫柔儒如糸綿織麻細而著夫大領无比時其國行主雖櫻部任也國上視於著大領之衣而取言非可著汝之衣不返也妻問何衣答國上取復問彼衣心惜思耶答言甚惜妻即往居國上之前乞言衣賜爾國上言何女引捨使引不動女二指以取國上居床之端居惣持出於國府門外國上衣襴捕粉條然乞言衣賜國上惶煩彼衣返與取持歸家洒淨牒收其衣于呉竹捕粉如練糸大領之父母見之大惶告其子言汝依此妻國司見忽行事大惶告國司作是事各動有武等何作不能寢益故送本家而不勝然後此孃至彼里草津川之河津而衣洗時商人大船載荷垂過船長見孃言煩嘲女言默女言犯人者煩痛所拍船長聞瞋留船打女不痛拍船半引居舳下入水雇津邊人船物持上然更載船言无禮故引居船何故諸人令陵賎女船荷載惣亦一町程引上而居於船人大惶長咒白言犯也服也故女聽許彼船五百人引不動故知彼力過五百人力如經説作餅供養三寶者得金剛那羅延力云是以當知先作大枚餅供養三寶衆僧得此強力矣食國二合久尓宇師之和反柔音尓夏及尓古也可二儒音難反良弖都九里于留和之居惣二合惠襴須曾條然二合都太惶恐也洒支弖國司乎主良尓母作是二合加久寸留乎動伊可母又云也母又云曾土毛寸流去土何作二合伊可寢嘲惠都良可志母知阿曾弖舳雇載惣下云奈何良長跪服宇極窮女於尺迦丈六佛願福分示奇表以現得大福縁第廿八聖武天皇世奈羅京大安寺之西里有一女人極窮命活无由而飢流聞大安寺丈六佛衆生所願急能施賜買花香油而以參往於丈六佛前奉白之言我昔世不修福因現身受取貧窮之報故我施寶令免窮愁累日經月願祈不息如常願福獻花香澄罷家而寐明日起見于門椅所有錢四貫著之短籍而注謂之大安寺大修多羅供錢女人恐急以之送寺時宗僧等見入錢藏封印不誤唯無錢四貫故取納藏矣女又參向于丈六前獻花香燈罷家而寢明日起見乎庭中有錢四貫又短籍注謂大安寺常修多羅供錢女以送寺宗之僧等見錢器封不誤也開見之唯无錢四貫怪之藏封女如先女參往丈六前願白福分罷家而寢明日開戸見之前有錢四貫著短籍謂大安寺成實論宗分錢女以送寺宗僧等見入錢之器猶封不誤開見之唯无錢四貫爰六宗之學頭僧等集會怪之問女人曰汝爲何行答曰无所爲唯依貧窮存命無便無歸無怙故我是寺尺迦丈六佛獻花香燈願福分耳衆僧聞之而量言是佛賜錢故我不藏返賜女人女得錢四貫爲上縁大富饒財保身存命諒知尺迦丈六不思議力女人至信奇表之事矣寐寢如上商量二合土自支弥行基大徳放天眼視女人頭塗猪油而呵嘖縁第廿九故京元興寺之村嚴備法會奉請行基大徳七日説法于是道俗皆集聞法聽衆之中有一女人髮塗猪法居中聞法大徳見之嘖言我甚臭哉彼頭蒙血女遠引棄女大恥出罷凡夫肉眼是油色聖人明眼見視宍血於日本國是化身聖也隱身之聖矣行基大徳携子女人視過去怨令投淵示累表縁第卅行基大徳令堀開於難波之江而造船津説法化人道俗貴賎集會聞法爾時河内國若江郡川派里有一女人携子參往法會聞法其子哭譴不令聞法其兒年至于十餘歳其脚不歩哭譴飮乳物無間大徳告曰咄彼孃人其汝之子持出捨淵衆人聞之當頭之曰有慈聖人以何因縁而有是告孃依子慈不棄猶抱持聞説法明日復來携子聞法子猶哭聽衆障囂不得聞法大徳嘖言其子捉淵爾母怪之不得思忍擲於深淵兒更浮出於水之上踏足攅手目大瞻断而慷慨曰惻哉今三年微食耶母怪之更入會聞法大徳問言子擲捨耶時母答具陳上事大徳告言汝昔先世負彼之物不償納故今成子形徴債而食是昔物主嗚呼恥矣不償他債寧應死耶後世必有彼報而已所以出曜經云負他一錢鹽債故墮牛負鹽所駈以償主力者其斯謂之矣將建塔發願時生女子捲舍利所産縁第卅一丹生直弟一者遠江國磐田郡之人也弟一作塔發願未造其塔而歴淹年猶願果毎軫于壞聖武天皇御世弟上年七十歳妻年六十二歳懷妊生女捲左方手以所産愁生父母怪之開于捲手禰固捲猶故不舒父母愁曰嫗非時産子根不具斯爲大恥以因縁故汝生我子廼不嫌棄而慈哺育漸隨長大面容端正年至七歳開手示母曰見是物因瞻掌有舍利二粒歡喜異奇告知諸人諸人衆喜展轉國司郡卿悉喜引率知識建七重塔安彼舍利以供養了今磐田郡部内建立磐田寺之塔是也立塔之後其子忽死知願无不得先願无不果者其斯謂之矣淹久也毎常也軫容端正二合皮良支良粒明也貸用寺息利酒不償死作牛役之償債縁第卅二聖武天皇世紀伊國名草郡三村人爲藥王寺率引知識息晋藥分藥王寺今謂勢多寺也其藥料物寄手岡田村主姑女之家作酒息利時有斑犢入藥王寺常伏塔基寺人擯出又猶還來而伏不避怪之問他曰誰家犢一人而无言我犢者寺家投之著繩繋送年長大於寺産業所駈使歳經之五年時寺之檀越岡田村主石人夢見其犢牛追於石人以角棠仆以足踰之石人愕叫於是犢牛問言汝知我也答不覺也彼牛放退屈膝而伏流涙白言我者有櫻村物部麿也字號鹽舂也是人存時不中矢猪念我當射舂鹽往荷見之无猪但矢立於地里人見咲號曰鹽舂故以爲字也吾先是寺藥分之酒貸用二斗未償以死所以今受牛身而償酒債故役使耳應役之年限於八年所役五年未役三年寺人无慈打於我背而追駈使斯甚苦痛自非檀越无愍之人故申愁状石人問曰何以故知矣牡答之曰問櫻大娘而知虚實大娘者作酒家主即石人之妹也獨大怪之往乎妹家具陳上事答實如言貸用酒二斗未償而死於知寺僧淨達並檀越等悟於因縁垂哀愍心爲修誦經遂八年已不知所去亦更不見當知負債不非无彼報豈敢忘矣所以成實論之若人負債不償墮牛羊鹿驢馬等中償其宿債者其斯謂之矣息良利于万皮志又云母寸牡犢男牛子槌也餘棠都支愕恐也延世米姑乎皮舂都岐女人惡鬼見點攸食縁第卅三聖武天皇世擧國歌詠之謂奈禮乎曾與羊爾保師登多禮阿牟知能古牟智能餘召豆能古南无耶仙佐加文佐加母持酒利法万宇師夜万能知識阿万志爾爾時大和國十市郡菴知村東方有大富家姓鏡作造有一女子名曰萬之子未嫁未通面容端正高姓之人伉儷猶辭而經年祀爰有人伉儷亦送物彩帛三車見之心兼近親隨語許所裏交通其夜内有音而言痛哉三遍父母聞之相談之曰未效而痛忍猶寐矣明日曉起家母叩广驚喚不答怪開見唯遺頭一指自餘皆父母見之慄惆懆乎送妻之彩帛返成畜骨載之三車亦返成米臾不也八方人聞集臨見之无不怪也韓筥入頭初七日朝置三寶前以爲齋食乃疑交表先現波歌是表也或言神怪或言鬼芙覆思之猶是過去怨斯亦奇異事點咏于多比弖菴音阿无反伉儷二合与波不二晩閨称夜叩惆哀也懆患也娉音弁反表也啖食也覆爪孤孃女憑敬觀音銅像示奇表得現報縁第卅四諾樂右京殖槻寺之邊里有一孤孃未嫁无夫姓名未詳也父母有時多饒留財數作屋倉奉鑄觀世音菩薩銅像一體高二尺五寸隔家成佛殿安彼像以之供養聖武天皇御世父母命終奴婢逃散馬牛死亡失財貧家獨守空宅晝夜哀啼流涙聞觀音菩薩者所願能與其銅像手繋繩牽之供花香燈用願福分曰我乃一子而无父母孤唯獨居亡財貧家存身无便願我施福早急施晝夜哭願里有富者妻死而鰥見之是孃通媒作作儷孃答之言我今貧身裸衣无被何爲障面參向相語媒還告伏壯聞之言彼身貧窮而无衣服我明可知唯聽不也媒往告知孃猶否辭強入嬲廼心聽許與壯而交明日終日降雨不止障雨不避三日留之矣壯飢言我飢賜飯妻言今進起竃燃火居于空押頬而蹲入于空屋徘徊大嗟嗽口洒手參入堂内繋像引繩涕泣白言莫令受恥我急施財罷出如先向空竃戸押頬而蹲爰日申時急叩門喚人出見有隣富家乳母大櫃貝納百味飮食美味芬馥无不貝物器皆牒子即與之言聞有客人故隣大家具進納物唯器後給大歡喜不勝幸心脱著黒衣與使而言无物可獻但有垢衣幸受用之使母取著急還去以食饗夫見食而怪不見彼食猶瞻妻面明日夫去以絹十疋米俵送妻而言絹颯縫衣被米急作酒孃往彼富家而述幸心以慶貴之隣家室曰癡孃子哉若託鬼耶我不知也彼使猶言我亦不知矣所嘖歸家如常將禮入堂而見著使黒衣被銅像爾廼知之觀音所示因信加慇懃恭敬彼像從此以來得本大富脱飢無愁夫妻无夭全命存身也斯奇異事矣孃數媒壯乎土古尓強嬲廼乃也奈倍乎蹲瀬寸洒颯急也託嗟打法師以現得惡病而充縁第卅五宇遲王者天骨邪見不信三寶聖武天皇御世是王有縁徘徊山背八人從之向於奈良京時下毛野寺沙門諦鏡自奈良京往於山背歩綴喜郡師率値王无所避退傾笠匿面立乎路側彼王見之留馬令刑師與弟子入乎水田而逃避走猶強追打師負持藏皆撃破損時法師呼曰奚无護法歟王去不遠於其路中受重病高聲叫呻踴離于地二三尺許從者知状勸請法師否不受三遍請之猶終不受問曰病答甚爲痛法師復曰斯下賎王千遍痛病萬遍痛病時王眷屬奏於天皇諦鏡法師咀于宇遲今提將殺天皇知状猶忍不可王經三日如墨而卒眷屬復奏殺報之者殺而報之宇遲既死受於諦鏡以報怨也天皇勅詔朕亦法師諦鏡亦僧法師云何殺於法師宇遲招災非諦鏡咎天皇剃除鬢髮受戒行道故償比法師不殺諦鏡狂王宇遲邪見太甚護法加罰護法非无何不恐之也觀音木像示神力縁第卅六聖武太上天皇世奈良京下毛野寺金堂東脇士觀音之頚无故斷落也檀主見之明日將奉繼經一日一夜而朝見其頚自然如故繼加以放光誠知理智法身常住非无爲令知於不信衆生所示也觀音木像不燒火難示威神力縁第卅七聖武天皇世泉國泉郡部内珍努上山寺居于正觀自在菩薩木像而敬供之時失火燒其佛殿彼菩薩木像自所燒殿出二丈許而伏无損誠知三寶之非色非心雖不見目而非无威力此不思議第一也因慳貪成大蛇縁第卅八聖武天皇御世諾樂京馬庭山寺一僧常住其僧臨命終時告弟子言我死之後至于三年室戸莫開然死後經七日在大毒蛇伏其室戸弟子知因飛化而開室戸見之錢卅貫隱藏也取其錢以爲誦經修善贈福矣誠知貪錢因隱得大蛇身返護其護也雖見須彌頂不得見欲山頂者其斯謂之矣藥師佛木像流水埋沙示靈表縁第卅九駿河國與遠江國之堺有河名曰大井河其河上有鵜田里是遠江國榛原郡部内也奈良宮治天下大炊天皇御世天平寶字二年戊戌春三月彼鵜田里河邊沙之中有音而曰取我矣取我矣于時有僧經國而行過彼當時取我之曰音猶不止僧呼求之邂逅得聞沙底有音思埋死人之蘇還也堀見有藥師佛木像高六尺五寸左右耳缺敬禮哭言我大師哉何有過失遇是水難有縁偶値願我修理引率知識勸請佛師令造佛耳鵜田里造堂居尊像以之供養令號曰鵜田堂矣是佛像有驗放光所願能與故道俗歸敬傳聞優填檀像起致禮敬丁蘭木母動示生形者其斯謂之矣鵜于捺破里邂逅上音解反下音果遠反二合好於惡事者以現所誅利鋭得惡死報縁第四十橘朝臣諾樂麻呂者葛木王之子也強窺非望心繋國招集逆黨當頭其便畫作僧形以之立的效射僧黒眼之術好諸惡事无過斯甚諾樂麻呂之奴於諾樂山爲鷹鳥而見之其山多有狐子奴投狐子用木刺串立其穴戸奴有嬰兒母狐結怨返身化作奴兒之祖母抱奴子迄于己穴戸如串己子貫奴子立穴戸雖賎畜生報怨有術現報甚近不无慈心爲无慈行致无慈怨然後不久諾樂麻呂天皇見嫌利鋭攸刎則以知之先惡行者令逢利鋭所殺之表也斯亦奇事也女人大蛇所婚頼藥力得全命縁第四十一河内國更荒郡馬甘里有富家有女子大炊天皇世天平寶字三年己亥夏四月其女子登桑揃葉時有大蛇纏於登女之桑而登往路之人見示於孃見驚落蛇亦副墮纏之以婚慌迷而臥父母見之請召藥師孃與蛇倶載於同床歸充置庭燒稷藁三束三尺成來爲三束合湯取汁三斗煮煎之成二斗猪毛十把剋未合汁然當孃頭足打懸釣開口入汁入一斗乃蛇放往殺而棄蛇子白凝如蝦蟆子猪毛立蛇子身從出五升許口入二斗蛇子皆出迷或之孃乃醒言語二親問之答我意如夢今醒如本藥服如是何謹不用然經三年彼孃復蛇所婚而死愛心深入死別之時戀於夫妻及父母子而作是言我死復世必復相也其神議者從業因縁或生蛇馬牛犬鳥等先由惡契爲蛇愛婚或爲怪畜生愛欲非一如經説昔佛與阿難自墓邊而過夫妻二人共備飮食祠墓慕哭夫戀母啼妻詠泣佛聞妻哭出音而嘆阿難白言以何因縁如來嘆之佛告阿難是女先世産一男子深結愛心口等子母經三年條得病臨命終時撫子而斯之言我生世常生相之生隣家女終成子妻祠自夫骨而今慕哭知本末事故我哭耳者其斯謂之矣又如經説昔有人兒其身甚輕疾走如飛鳥父常重愛守育如眼父見子輕譬之而言善哉我兒疾走如狐其子命終後生狐身應願善辟不欲惡辟必得彼報故也極窮女憑手觀音像願福分以得大富縁四十二海使女者諾樂左京九條二坊之人也産生九子極窮无比不能生活向穗寺於千手像而願福分一年不滿大炊天皇之世天平寶字七年癸卯冬十月十日不慮之外敢其妹來以皮櫃寄姉而往之脚染馬屎曰我今來故是物置也待之不來故往問弟答不知爰内心思怪開櫃而見有錢百貫如常買花香油往千手前而見其足著之馬屎爾乃疑思菩薩錢歟過三年聆收千手院修理分之錢无百貫因皮櫃知彼寺之錢委是箴觀音所賜贊曰善哉海使氏長母朝視飢子流泣血涙夕燒香燒願觀音徳應錢入家滅貧窮愁感聖留福流大富泉養兒飽發衣苑委慈子來祐買香得價如涅槃經説母慈子因自生梵天者其斯謂之矣斯奇異之事矣一交了
