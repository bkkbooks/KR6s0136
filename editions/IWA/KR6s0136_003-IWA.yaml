body:
  text: 日本國現報善惡靈異記卷下諾樂右京藥師寺沙門景戒録夫善惡因果者著於内經吉凶得失載諸外典今探是賢劫尺迦一代教文有三時一正法五百年二像法千年三末法萬年自佛涅槃以來迄于延暦六年歳次丁卯而逕一千七百廿二年過正像二而入末法然日本從佛法僧適以還迄于延暦六年而逕二百卅六歳也夫花咲無聲鷄鳴無涙觀代修善之者若石峯花作惡之者似土山毛匪因果作罪以比無目之人履失之兮虎見尾嗜名利殺生疑善根惡報來如鏡託鬼之人抱毒蛇莫朽之向之即現夸力颯被如谷響喚之必應現報若之人不愼乎此生空過後悔無益暫爾身存之泛爾命孰常恃之既入末劫何弗仂矣喃汎言惻那免劫災唯資施衆僧一搏食於修善之福而不逢當來飢饉之災苦頼持一日不殺戒於行道之力而不値末劫刀兵之怨昔有一比丘住山坐禪毎齋食時拆飮施烏常啄効毎日來候比丘齋食訖後嚼楊枝嗽口洒手把礫翫烏居籬外時彼比丘不居烏投礫中烏頭破飛即死生猪住其山彼猪至於比丘室上頽石求食下中比丘而死猪不思賊石自來殺無記作罪無記報怨何況乎發惡心殺無彼怨報歟殖惡之因怨惡之果是吾迷心作於福因而鑒菩提是我寤懷羊僧景戒所學者未得天台智者之問術所悟者未得神人辯者之答術是猶以螺酌海因管天者矣匪傳燈之良匠而強訂斯事尅轍淨刹奔心覺路遠愧前非長祈後善注奇異事尓言提流授手欲勸濡足欲導庶掃地共生西方極樂傾巣同住天上寶堂者矣載諸於也探祀頃二合止之吉呂甘太久万之比以來迄逕過適始也以還迄咲聲鷄鳴涙觀匪不也兮者也安千万見嗜疑如也託夸福也福也響嗚愼烏也長也長也暫爾万良久乃暫示泛爾加利佐万奈留泛示孰誰也熟仂勤也喃安波礼噫矜言和礼惻哀也那資逢苦謹也頼旨也値時拆部之天又云和加知天折效奈良比天効啄音丁角反破祢天鳥物食也喙候毛良不嚼洒居見也居中頽徑久津加幣利合示善惡表縁卅九條憶持法華經者舌著曝髑髏中不朽縁第一殺生物命結怨作狐狗互相報怨縁第二沙門憑願十一面觀音像得現報縁第三沙門誦持方廣大乘沈海不溺縁第四妙見菩薩變化示異形顯盜人縁第五禪師將食魚化作法華經覆俗誹縁第六被觀音木像助脱王難縁第七彌勒菩薩應於所願示奇形縁第八閻羅王示奇表勸人令修善縁第九如法奉寫法花經火不燒縁第十二目盲女人歸敬藥師佛木像以現得明眼縁第十一二目盲男敬稱千手觀音日摩尼手以現得明眼縁第十二將寫法花經建願人依願力得全命縁第十三拍于憶持千手咒者以現得惡死報縁第十四撃于沙彌乞食以現得惡死報縁第十五女人濫嫁飢子乳故得現報縁第十六未作畢捻攝像生呻音示奇表縁第十七奉寫法華經師爲邪婬以現得惡死報縁十八産生肉團之作女子修善化人縁第十九奉寫法花經女人誹過失以現口斜報縁第二十沙門一目眼盲使讀金剛般若經得明眼縁第二十一重斤取人物又寫法花經以現得善惡報第二十二用寺物復將寫大般若建願以現得善惡報縁第廿三依妨修行人得猴身縁第二十四漂流大海敬稱尺迦佛名得全命縁第二十五強非理徴債取多倍而現得惡死報縁第二十六髑髏目穴笋掲脱以祈之示靈表縁第二十七彌勒丈六其頚蟻所嚼示奇異表縁第二十八村童戲刻木佛像愚夫破斫以現惡死報縁第廿九沙門積功作佛像臨命終時示異表縁第三十女人産石以爲神而濟縁第三十一用網漁夫値海中難憑願妙見得全命縁第卅二刑罰賎沙彌乞食以現得頓惡死報第卅三南怨病嬰身因之受戒行善以現得愈病縁第卅四假官勢非理爲政得惡報縁第卅五減塔階仆寺幢得惡報縁第三十六不顧因果作惡受罪報縁第卅七災與善表相先現而後其災善答被縁第卅八智行並具禪師重得人身生國皇子縁第卅九憶持法花經者舌著曝髑髏中不朽縁第一諾樂宮御宇太八州國之帝姫阿倍天皇御代紀伊國牟婁郡熊野村有永興禪師化海邊之人時貴其行故美稱菩薩從天皇城有南故號曰南菩薩爾時有一禪師來之於菩薩所持之物法花經一部字細少書減卷數成一卷持之白銅水瓶一口繩床一足也僧常誦持法華大乘以之爲宗歴一年餘而思別去敬禮禪師奉施繩床而語之曰今者罷退欲居山踰於伊勢國禪師聞之糯干飯舂二斗以之施師優婆塞二人副共遣使見送是禪師一日道所送而以法花經鉢干飯粉等與優婆塞自此令還唯以麻繩廿尋水瓶一口而別去逕送二年熊野村人至于熊野阿上之山伐樹作船聞之有音誦法花經累日逕月猶讀不止造船之人聞讀經音發心貴之自分粮以推求之不瞰形色故還而居讀經之音如先不息後歴半年爲引船人入山聞之讀經音猶不止怪曰禪師怪往而聞有實尋求見之有一屍骨以麻繩繋二足懸巖捉身而死骨側有水瓶乃知別去之禪師也永興見之悲哭而還然歴三年山人告云讀經之音如常不止永興復往將取其骨見髑髏者至于三年其舌不腐然生有諒知大乘不思議力誦經積功驗徳也贊曰貴哉禪師受血肉身常誦法華得大乘驗捉身曝骨而髑髏中著舌不爛是明聖也不凡矣又吉野金峯有一禪師往峯行道禪師聞往前有音讀於法花經金剛般若經聞之留立排開草中而見之者有一髑髏歴久日曝其舌不爛而生者著有禪師取收淨處語髑髏言以因縁故汝値於我便以草葺覆於其上共住讀經六時行道禪師隨讀法花髑髏共讀故見彼舌振動矣是亦奇異之事也州嶋也姫熊口万踰超也逾古由糯副紲糧可里弖乎伐支天瞰見也側腐然世加尓蒙然二合牟世可尓生尓天惡左良可尓之弖諒不比弖麻推曝葺覆粉紲殺生物命結怨作狐狗互相報縁第二禪師永興者諾樂左京興福寺沙門矣俗姓葦屋君氏一云市往氏攝津國手嶋郡人也住于紀伊國牟婁郡熊野村而修行時彼村有病者是將來於禪師住寺勸請禪師而令看病咒之時愈即退發病如是生經多日不輟強盟猶咒病者託曰我是狐矣無用不伏禪師莫強問之何故答期先殺我報彼怨是人纔死生大殺我聞怪教化不放而殺一年之後其怨人臥室禪師之弟子臥病爾時有人繋犬於禪師而來彼犬吠狐脱枷顯欲奔禪師怪之告犬主言應放知由纔放走入病弟子室咋狐引出禪師禁犬不免殺委斃人還報彼怨嗚呼惟也怨報不朽何以故瑠璃王報過去怨而殺釋衆九千九百九十萬人以怨報猶不滅如車輪轉若有人能發忍脣時見怨人者爲我恩師不報彼怨以之爲忍是故怨者即忍之師所以書傳云若不買忍心凡打殺其母者其斯謂之矣輟止也盟知可比天狐可支天吠脱波奈知天皮奈千天奔引殺明也斃死也纔七多太久佐利乎沙門憑願十一面觀世音像得現報縁第三沙門辨宗者大安寺之僧也天年有辨白堂爲宗多知檀越高得衆氣帝姫阿倍天皇代辨宗受用于其寺大修多羅供錢卅貫不得償納維那僧等徴錢而逼償債無便故登於泊瀬上山寺參向十一面觀音菩薩之手繩繋引之而白言我用大安寺修多羅宗分錢而償無便願我施錢稱名以願求是維那等來徴之猶逼答言暫待我於菩薩白錢將償敢久不延于時船親王有善縁參至其山寺備法事而行辨宗法師繋像引繩猶白之曰錢速賜我徴錢速償親王聞之問弟子言以何因縁今斯禪師如是白耶弟子答之如上具述親王聞状出錢償寺方知觀音大悲法師深信矣徴逼沙門誦持方廣大乘海不溺縁第四諾樂京有一大僧名未詳也僧常誦於方廣經典即俗貸錢蓄養妻子一女子嫁別住夫家帝姫阿陪天皇代之時聟任於奧國椽則舅僧貸錢廿貫爲裝束向於所任之國歴歳餘識錢一倍僅償本錢未償利錢彌逕年月猶徴乞之聟竊懷嫌而作是念求便殺舅不知猶平心而乞聟語舅曰將共奧舅聞之往乘船度奧聟與船人同心謀惡縛僧四枝擲陷海中往語妻曰汝之父僧欲汝面率共度來忽値荒浪驛船海大徳溺流救取無便終漂亡但我僅活耳其女聞之大哀哭言無幸亡父片圖失寶我別知之能見父儀寧視底玉亦得父骨哀哉痛哉僧沈海至心讀誦方廣經海水凹開踞底不溺逕二日二夜後他船人向於奧國而度恩之繩端泛有於海而漂留船人取繩牽之忽僧上形色如常於是船人大怪問之汝誰答之我某我遭賎盜繋縛陷海又問師何有要術故水不死答我常誦持方廣大乘其威神力何更疑之唯聟姓名向他不顯具我泊奧船人隨異送之於奧彼聟奧國而爲陷舅聊備齋食供於三寶舅僧展轉乞食偶値法事有於白度之例匿面而居受其供養聟椽自捧於布施獻於衆僧於是於海中僧由手受施行椽見之目青面赦然驚恐而隱法師合咲不瞋而忍終後不顯乎彼惡事是沈海水汚不溺毒魚不呑身命不亡誠知大乘威驗諸佛加護贊曰美哉不擧彼惡猶能忍之寔斯法師鴻立忍辱高行所以長阿含經云以怨報怨如草滅火以慈報怨如水滅火者其斯謂歟矣即俗上川支天寔誠也陷於止之意礼天於土之伊礼天詐漂青良可尓二合川良可尓赫然於無日天利天二合於毛保天天汚天久保美天鴻大也又本即俗支天陷見也舅圖寔誠也漂青赫然汚鴻大也備椽音乘反妙見菩薩變化示異形顯盜人縁第五河内國安宿郡部内有信天原山寺爲妙見菩薩獻燃燈處畿内毎年奉於燃燈帝姫阿倍天皇代知識縁依例獻於燃燈菩薩並室主施於錢財物其布施錢之中五貫師之弟子竊盜而隱後爲取錢往見之無錢但鹿負仏前而仆死之仍爲荷鹿返于河内市邊井上寺之里率人等而至見之非鹿唯錢五貫因顯盜人定知是非實鹿菩薩所示矣是奇異之事矣畿辛反童歸鹿負矢死禪師將食魚化作法花經覆俗誹縁第六吉野山有一山寺名號海部峯也帝姫阿倍天皇御世有一大僧住彼山寺精懃修道疲身弱力不得起居念欲食魚語弟子言我欲魚汝求養我弟子受師語至於紀伊國海邊買鯔八隻納小櫃而歸上時本如檀越三人遭道而問之言汝持物何物之也童子答言此法花經也從持小櫃垂魚之汁其臭狐魚俗念非經即至於大和國内市邊俗等倶息俗人逼言汝之持物非經此魚也童子答言非魚當經也俗強令開不得逆拒開櫃見化法花經八卷也俗等見之恐奇而去彼一俗念猶奇見遂而竊窺往童子至於山寺向師具陳於俗等事禪師聞之一怪一喜知天守護然食彼魚時窺往俗見五體投地白禪師言雖實魚體而就聖人之食物者化法花經也我愚癡邪見不知因果而犯逼惱亂願罪脱賜自今已後爲我大師恭敬供養自爾俗成大檀越供養禪師當知爲法助身於食物者雖食雜毒而成甘露雖食魚害而非犯罪魚化成經天感齊道此復奇異事也海部峯買鯔名吉遭垂汁息逼強開逆礼加皮欠拒己皮牟遂竊窺有加土往鮮被觀音木像之助脱王難縁第七正六位上大眞山繼者武藏國多磨郡小河郷人也其妻白髮部之氏女也山繼爲征人賊地毛人打所遣廻賊地之頃彼妻爲令脱賊難作觀音木像慇懃經之數年帝姫阿倍天皇御世天平寶字八年甲辰十二月山繼遭賊中臣仲麿之亂而羅於殺罪之例八十三人類誅十二人頚訖時山繼心迷或彼奉作敬供觀音木像呵嘖而言咄汝何居此穢地哉擧足從項踰通而爲行即見其頚張曳將打殺時勅使馳來言若大直山繼在此類耶答曰有之今將誅殺使誅莫殺唯當流罪於信濃國所流然後不久召上令官而多磨郡少領所任也逢難所張曳其眼猶殘也山繼脱殺全命之者觀音助救也故於己作善功徳發信至心即大歡喜被助脱災故咄行二合皮支二合牟加波行騰二合曳乃踰不三通誅岐利彌勒菩薩應於所願示奇形縁第八近江國坂田郡遠江里有一富人姓名未詳也將寫瑜伽論發願未寫而淹歴年家財漸衰生活無便離家捨妻子修道求祐猶願果常愁于懷帝姫阿陪天皇御世天平神護二年丙午秋九月至一山寺累日止住其山寺内生立一柴其柴枝皮上忽然化生彌勒菩薩像時彼行者見之仰瞻巡柴哀願彼諸人傳聞來見彼像或獻俵稻或獻錢衣及以供上一切財物奉繕寫瑜伽論百卷同設齋會既而其像淹然不現誠和彌勒之高有兜率天上應願所示願主下在苦縛凡地深信招祐何更疑之也表音牛反寫淹奄然忽也懷心也閻羅王示奇表勸人令修善縁第九藤原朝臣廣足者帝姫阿倍天皇御代修病嬰身爲差身病神護景雲二年二月十七日至大和國菟田郡於眞木原山寺而住持八齋戒取筆書習就机迄于暮而不動侍者童男異之睡眠驚動白言臻日沒時故應禮佛然猶不驚強押振動隨手取筆四支曲屈樹仆不氣訂之死從者悚怖慄走歸家告知親屬聞之備喪殯物經也三日往見之蘇甦起居待屬等問之答語有人鬚生逆類下著緋上著佩兵持桙喚廣足言闕急召汝以棠背立前逼將先見一人後見二使之中立我追走往前道中斷有深河水色黒黛不流仲寂以置中彼方二端不及前立人言汝沒此河能踐我蹤踏躅令度前道之頭有重樓閣耀放晃四方懸其中居人不覲面一使走入而白之言召將來也告之召入奉詔召入聳問先知於汝後立人不也廣足妻懷任不得産兒而死也乃答之曰是實我妻復告依此女患事故召汝耳斯女可受苦六年之中三年受未受三年今愁之由孕於汝兒而嬰之死故今殘苦與汝倶受廣足白言我爲此女寫法華經講讀供養救所受苦妻白言實如白忽免應還便隨女白而告之曰速還疾修廣足受詔罷至闕門即念欲知召我之人我更還白也欲知御名爰告欲知我閻羅王汝國稱地藏菩薩是也即下右手摩我頂告我印點故之不逢災速忽還往彼手指大抱如十抱餘廣足朝臣如也語傳爲彼死妻奉寫法花經講讀供養追贈福聚贖祓彼苦斯奇異事矣照也倏忽曲屈可末那可良闕祢加止保己保古乎保乎去棠支沖深也止志母止蹤止乎踏躅如上阿止乎頭懸玉乃主多礼抱于田支如法奉寫法華經火不燒縁第十牟婁沙彌者榎本氏也自度無名紀伊國牟婁郡人故字號牟婁沙彌者居住安諦郡也荒田村剃除鬢髮著袈裟即俗收家營造産業發願如法清淨奉寫法花經一部專自書寫毎大小便利洗浴淨身自就書寫莚以還逕六箇月乃繕寫畢供養之後入於塗染皮筥不安外處置於住室之翼階時讀之神護景雲三年歳次己酉夏五月廿三日丁酉午時發火惣家皆悉燒滅唯彼納經之筥有於盛火之中都無所燒損開筥見之經色儼然文字然八方人視聞之無不奇異諒知阿東練行尼所寫如法經之功顯陳時王與讀經免火難之力再示贊曰貴哉榎本氏深信積功寫一乘經護法神衞火呈靈驗是不信人愍之能談邪見人輟惡之穎師矣營造意東那三上訓伊止那見漆宇留翼陛翼階二合屋乃幾翼二合乃岐惣家上訓志師保那何良陳時時名也王與女三人名天與女三合字者人名也阿東練行尼五人名也儼然上音嚴反二合伊豆久之口師弖嚴穎勝也二目盲女人歸敬藥師佛木像以現得明眼第十一諾樂京越田池南蓼原里中蓼原堂在藥師如來木像當帝姫阿倍天皇之代其村有二目盲女此生一女子年七歳也寡而無夫極窮無比不得索食將飢而死自謂宿業所招非唯現報徒空飢死不如行念善使子控手迄于其堂向藥師佛像願眼而曰非惜我命一惜我子命一旦已二人之命也願我賜眼檀越見矜開戸入裏向像之面以令稱禮逕之二日副子見之從其像臆如脂物忽然出垂子告知母聞欲食故告子曰搏含吾口食也甚甜便二目開定知至心發願者無不得之也是奇異之事矣蓼索乞也矜如副子從臆桃脂物垂搏取也含甜阿万之阿万師二目盲男敬稱千手觀音摩尼手以現得明眼縁第十二太良京藥師寺東邊里有盲人二眼精盲歸敬觀音稱念日摩尼手明眼闇晝坐藥師寺於正東之門披敷布巾稱禮日摩尼手也名往來之人見哀之者錢米穀物施置巾上或坐巷陌稱禮如上日中之時聞打鐘之音參入其寺而就衆僧乞飯命活而經數年至帝姫阿陪天皇之代不知二人來云汝矜故我二人治汝盲目左右各治了語言我逕二日必來是處愼待不忘其後不久倏二眼明平復如故當期日待終復不來贊曰善哉彼二目盲者現生開眼遠通太方捨杖空手能見能行誠知觀音徳力盲人深信也精盲安支之比二合阿支志比巾太力己比巷陌知末多二合將寫法花經建願人肉暗穴頼願力得全命縁第十三美作國英多郡部内有官取鐵之山帝姫阿陪天皇御代其國司召發役夫十人令入鐵山入穴堀取鐵時山穴口忽然崩塞動役夫驚恐從穴競出九人僅出一人有後出彼穴口塞合留國司上下思之所壓而死故惆悵之妻子哭愁圖繪觀音像寫經追贈福力而逕七日已訖于時獨居穴裏念吾先日願奉寫法花大乘而未寫斷我命全給我必奉果居于闇穴而惆悵之自生長時至于今日無過此哀彼穴戸指剌許開日光被至故有一沙彌自入來鉢饌食以與之語汝之妻子供我飮食雇吾勸救汝復哭愁故我來之自出去後不久當乎居頂而穴開通日光照被及也穴開通廣方二尺餘高五丈許于時卅餘人取葛入山自穴邊往穴底人見人叫言取我手云山人側聞如蚊音即聞怪之取葛繋石下底而誡底人取別明知人也結葛爲繩編葛爲篭以四葛繩篭四角機立穴門漸下穴底人乘篭以機牽上持送親家親屬見之哀喜無比國司問之汝作何善答曰如上國司聞之大悲引率知識相助造法花經供養已畢是乃法花經神力觀音贔更莫疑之矣壓悵哀被及惆惠哭愁刺側保乃可尓贔上比下音機反二合力起也是以山起力甚大力也悵哀也惆患也被乃也賜贈送也雇機編拍于憶持千手咒者以現得惡死報縁第十四越前國加賀郡有浮浪人之長探浮浪人駈使雜徭徴乞調庸于時有京尸小野朝臣庭麿爲優婆塞常誦持千手之咒爲業展轉彼加賀郡部内之山而修行神護景雲三年歳次己酉春三月廿七日午時其長有其郡部内御馬河里遇行者曰汝何國人答我修行者非俗人也長瞋嘖言汝浮浪人何不輸調縛打駈徭猶拒逆之懇引譬言衣虱上於頭而成黒頭虱下於衣而成白如是有譬頂載陀羅尼負經也意不遭俗難何故持大乘之我令打辱實有驗徳今示威力以繩繋千手經從地引也而去刑行者之處與長之程一里許長至也家門從馬將下堅不得下忽與乘馬騰空而往到搖行者之處懸空逕一日一夜明日午時自空落死彼身摧損如入嚢諸人見之無不懼恐如千手經説大神咒乾枯樹而得生枝柯華菓若有謗此咒者即爲謗彼九十九億恆河沙諸佛云方廣經云誹謗賢人者等於破壞八萬四千國塔寺之人罪者其斯謂之矣拍打也長探駈使徴乞其御馬河里嗔嘖輸出縛打拒逆墾安加良成負打辱示許騰往捶打明日空柯比己江枝柯繋乎浮浪宇加礼比止摧嚢懼恐乾枯徭音要于反政也虱程繋沙彌乞食以現得惡死報縁第十五犬養宿禰眞老者居住諾樂京活目目陵北之佐岐村也天骨邪見厭惡乞者當帝姫阿陪天皇之代有一沙彌就眞老之門而乞食眞老不施乞物返集袈裟諸見逼惱言汝曷僧也乞者答曰我是自慶眞老亦拍逐之沙彌大恨而去於其日夕煮鯉寒凝明日辰時起居朝床彼鯉含口取酒將飮自口里血返吐傾臥如幻絶氣如寐命終諒知邪見切身之利劍瞋心是招禍之疾鬼慳貪受餓鬼之苦因多欲障慈施之猛薮唯見來乞者可生憐愍和顏悦色法施財施所以丈夫論云慳心多者雖是泥安重於金玉悲心多者雖施金玉輕於草木見乞人時不忍言無悲泣墮涙云諸見比那自里奈曷那尓起居逐追也鯉己比薮於止呂女人濫嫁飢子乳故得現報縁第十六横江臣成女越前國加賀郡人也天骨婬濫嫁爲宗未盡丁齡死淹歴年記伊國名草郡能應里也人寂林法師離也國家經也他國修法求道而至加賀郡畝田村逕年止住奈良宮御宇大八嶋國白壁天皇世寶龜元年庚戌冬十二月廿三日之夜夢見從大和國鵈鵤聖徳王宮前之路指東而行其路如鏡廣一町許直如墨繩邊木草立林佇者之於草中有大快肥女裸衣而踞兩乳脹大如竃戸垂自乳流膿長跪以手押膝臨也病乳而言痛乳乎呻吟苦病林問汝何女答我有越前國加賀郡大野郷畝田村也横江臣成人之母也我齡丁時濫嫁邪婬幼稚子棄與壯夫倶寐逕也多日而子乳飢唯子之中成人甚飢先由幼子飢乳之罪故今受乳脹病之報問何脱此罪答成人知之我罪免也林自夢驚醒獨心怪思巡彼里孰於是有人答言當余是也林述於夢状成人聞之言我稚時離母不知唯有我姉能知事状問姉也時答實如語我等母公面姿妹妙爲男愛欲濫嫁惜乳不賜子乳爰諸子悲言我不思怨何慈母君受是苦罪造佛寫經贖母之罪法事已訖後悟夢曰今我罪免之矣誠知母兩甘乳寔雖思深惜不哺育返成殃罪豈不令飮哉淹久也鵈鵤二合意可留可畝佇乃曾支天脹波礼多留己古被太礼留支土大伊止太伊太丁左濫齡与肥未作畢捻像生呻音示奇表縁第十七沙彌信行者紀伊國耶賀郡彌氣里人俗姓大伴連祖是也捨俗自度剃除鬢髮著福田衣求福行因其里有一道場號曰彌氣山室堂其村人等造私之堂故以爲字法名曰慈氏禪師者未作畢有捻像二體彌勒菩薩之脇士也臂手折落居於鐘臺檀越量曰斯像隱藏乎山淨處信行沙彌常住其堂打鐘爲宗見像未畢猶以爲患落臂之者以糸縛副撫於像頂毎願之言當有聖人令得因縁淹逕數年白壁天皇代寶龜二年辛亥秋七月中旬從夜半有呻聲言痛哉其音細小如女人音而長引呻信行物思越山之人時頓病宿即起巡坊覓無病人怪之然彼病呻音累夜不恩不得乎忍起窺見之呻有鐘堂實知彼像信行見之一怪一悲時左京元興寺沙門豐慶常住其堂驚彼沙門叩室戸白咄大法師起應聞之矣具述呻状於豐慶與信行大怪大悲率引知試奉捻造畢設會供養令安置禰氣堂以居乎彌勒脇士之菩薩是也左大妙聲菩薩右法音輪菩薩誠知願無不得無願不果者其斯謂之也斯亦奇表之事也臂可比那嗣繼叩咄夜累夜息於奉寫法花經師爲邪婬以現得惡死報縁第十八丹治比經師者河内國丹治北郡人姓丹治比故以爲字其郡部内有一道場號曰野中堂有發願人以寶龜二年辛亥夏六月請其經師於其堂奉寫法花經女衆參集以淨水加經之御墨水時未申之間段雲雨降避雨入堂裏狹少故經師與女衆居同處爰經師婬心熾發踞於孃背擧裳而婚隨入携手倶死唯女口噛齧出而死知護法刑罰爰欲之火雖身心而由婬心不爲穢行愚人所貪如蛾投火所以律云弱眷自婬面門復涅槃經云知五欲法無有歡樂不得暫停如犬齧枯骨無飽厭期者其斯謂也矣阿和噛蛾比留脊那齧加不留久保牟口保踞孃産生肉團之作女子修善化人縁第十九備後國八代郡豐服郷人豐服廣公也妻懷任寶龜二年辛亥冬十一月十五日寅時産生一肉團其姿如卵夫妻謂爲非祥入笥以藏置也山石中逕七日而往見之肉團穀開生女子焉父女取之更哺乳養見聞人令國無不奇經八箇月不俄長大頭頚成合異人無身長三尺五寸生知利口自然聰明七歳以前轉讀法華八十花嚴默然不逕終樂出家剃除頭髮著袈裟修善化人無人不信其音多出聞人爲哀其體異人無無嫁唯出尿有竇愚俗呰之號曰猴聖時託磨郡之國分寺僧又豐前國宇佐郡之矢羽田大神寺僧二人嫌彼尼言汝是外道呰嬲之神人自空降以桙將裳僧恐叫終死也大安寺僧戒明大徳任彼竺紫國府大國師之時寶龜七八箇年比頃備前國佐賀郡大領子七位上佐賀君兒公設安居會請戒明法師令講八十花嚴之時彼尼不闕坐衆中聽講師見之呵嘖之言何尼濫交尼答之言佛平等大悲故爲一切衆生流布正教何故別制我因擧偈問之講師不得偈通諸高名智者怪之一向問識尼終不屈及知聖化而更立名號舍利菩薩道俗歸敬而爲化主昔佛在世時舍衞城須達長者之倶者之女蘇曼所生卵十枚開成十男出家皆得羅漢果迦毘羅衞城長者之妻懷任生一肉團到七日頭肉團開敷有百童子一時出家而百人倶得阿羅漢果我聖朝所彈壓之土有是善類斯亦奇異之事矣肉團良下音斷祥与支留笥乎介筒姿形卵穀可比古竇穴矢羽田惠都良加志嬲不留棠留比頃己呂保比尓蘇曼女名頭數惠尓誹奉寫法花經女人過失以現口斜縁第廿粟國名兮郡麻坦填村在一女人忌部首字曰多夜須子白壁天皇代是女奉寫法花於麻殖山寺于時麻殖郡人忌部連板屋擧顯彼女人之過失以誹謗故即口舒面戻於後而終不直法花經云受持經者諸根闇鈍陋率臂盲聾背傴又云見受持是經者出其過惡若實若不實此人現世得白癩病者斯謂也矣當愼信心應讚彼徳不謗其缺蒙大災故矣缺止加短比木比止比岐比土陋加多奈和加多那口率手奈攣弖奈弊躄阿志那倍背傴世奈加久世尓二合那加苦都尓癩音礼反沙門一目眼盲使讀金剛般若經得明眼縁第廿一沙門長者諾樂右京藥師寺之僧也寶龜三年之間長義眼闇盲逕五月許日夜恥悲屈請衆僧三日三夜讀誦金剛般若經便目開明如本平也般若驗力其大高哉深信發願無願不應故也重斤取人物又寫法花經以現得善惡報縁第廿二他田舍人瑕夷者信農國小懸郡跡目黒人也多富財寶錢稻出擧蝦夷奉寫法花經二遍毎遍設會講讀既了後復思議猶不足心更敬繕寫唯未供養寶龜四年癸丑夏四月下旬蝦夷忽率而死妻子景言丙年之人故不燒失點地作殯以置之死經七日而甦告言使有四人告副將往廣野次有卒坂登於坂上觀有大觀於是峙視前路多有數人以箒掃路言奉寫法花經之人從此路往故我等掃淨即至待禮前有深河廣一町許其河度椅有數人衆其椅理言奉寫法花之人從此椅度故我修理到便待禮到椅彼方有黄金宮其宮有玉椅本有三衢一道廣平一道草小生一道以薮而塞立蝦夷於其衢一人入宮曰召王見之言此奉寫法花經之人即示於草小生道言從此道將來四人副至熱鐵柱所令抱彼柱編鐵熱燒著背而押歴三日夜令抱銅柱編銅其熱著背而押又逕三日極熱如鐵銅雖熱非非安編鐵雖重非輕惡業所引唯欲抱荷合歴六日乃至三僧問蝦夷言汝知此意不也答不知也僧復問言汝作何善答我奉寫法華經三部唯一部未供養之也札出三枚二枚金札一枚鐵札亦斤出二枚一枝重倍稻一把一枝輕咸稻一把于時僧言授札之者實如汝曰敬寫三部法花大乘也雖寫大乘而作重罪所以者何汝用斤二出擧之時用於輕斤微納之日用於重斤故召汝耳今者忽還來如前多人以箒掃道作椅言奉寫法花經之人從閻羅王宮還來之度彼椅畢纔見甦還然而彼戴所寫之經發信心講讀供養誠知作善來福作惡來災善惡之報終不朽失並受二報唯専作善不可作惡矣蝦夷衣比須二合衣比主二合點女天皮比也乎卒左可之支峙立也箒皮支編毛乃可比乎債皮支皮也比死用寺物復將寫大般若建願以現得善惡報縁第廿三大伴連忍勝者信農國小懸郡孃里人也大伴連等同心其里中作堂爲氏之寺忍勝爲欲寫大般若經發願集物剃除鬢髮著袈裟受戒修道常住彼堂寶龜五年甲寅春三月倏被人讒堂檀越所打損而死檀越者即恩勝之同屬眷屬議曰令斷于殺人之罪故轉不燒失點地作冢殯收而置然歴五日乃甦語親屬言召使五人共副疾往道頭有其峻坂登於坂上而躊躇見有三大道一道平廣一道草生荒一道以薮而塞衢中有王使白言召王示平道言從是道將王使衞往道未有大釜湯氣如焔涌沸如波吼鳴如雷即生取忍勝井投彼釜冷破裂而成四破爰三僧出來問忍勝言汝作何善答我不作善唯欲寫大般若經六百卷故先發願而未書寫于時出三鐵札授之如白僧告之言汝實發願出家修道雖有是善而多用于住堂之物故摧汝身今還畢願後殯堂物纔放還來過三丈衢從坂而下即見甦返斯乃發願之力用物之災是我招罪非地獄咎矣大般若經云凡錢一文至廿日倍一百七十四萬三貫九百六十八文倍在故竊一文錢莫盜用也者其斯謂之矣塚皮比夜波比夜點左弖踏躇多千意左与比天躊躇二合多知伊佐与比弖躊躅二合井峻躊躇依妨修行人得猴身縁第廿四近江國野州郡部内御上嶺有神社名曰我大神奉依封六戸社邊有堂白壁天皇御世也寶龜年中其堂居住大安寺僧惠勝暫頃修行時夢人語言爲我讀經驚覺念怪明日小白猴現來言住此道場而爲我讀法華經云僧問言汝誰耶猴答言我東天竺國大王也彼國有修行僧從者數千所農業怠數千者千餘數之數千也因我制言從者莫多其時我者禁從衆多不妨修道雖不禁修道因妨從者而成罪報猶後生受此猴身成此社神故爲脱斯身居住此堂爲我讀法華經言然者供養行也時猴答曰無本應供物僧言此村籾多有此乎充我供養料令讀經猴答言朝庭臣我而有典主念之己物不免我恣不用典主者即彼神社司也僧言無供養者何爲奉讀經猴答言然者淺井郡有諸比丘將讀六卷抄故我入其知識淺井郡者同國内者郡也六卷抄者是律名也此僧念怪隨猴語往告檀越曰山階寺滿預大法師陳猴誹語其檀越師不受而言此猴語也我者不信不受不聽即將讀抄爲設之頃堂童子優婆塞走來言小白猴居堂上纔見九間大堂仆如微塵皆悉折權佛像皆破僧坊皆仆見誠如告既悉破損檀越曰僧更作七間堂信彼隨我大神題名猴之語同入知識而讀所願六卷抄成大神所願然後乎至于願了都無障難夫妨修善道儻得成猴報故僧勸催猶不可妨得惡報故往昔過去羅作國王時制一獨覺不令乞食入境不得七日頃飢依此罪報羅羅不生六年在母胎中者其斯謂也矣隨我二合字用音此大神名也典可止礼留儻戸牟良漂流大海敬稱尺迦佛名得全命縁第廿五長男紀臣馬養者紀伊國安諦郡吉備郷人也小男中臣連祖父麿者同國海部郡濱中郷人也紀萬侶朝居住於同國日高郡之潮結網捕魚馬養祖父丸二人傭債而受年價從萬侶朝臣不論苦行駈使引網捕魚白暴雨潮漲大水流出離木萬侶朝臣遣于駈使取於流木長男小男二人取木編桴乘於同桴拒逆而往水甚荒忽絶繩解祇過潮入海二人各得一木以乘漂流於海二人無知唯稱誦南無量災難令解脱尺迦牟尼佛哭叫不息其小男者逕之五日其日夕時淡路國南西田町野浦燒鹽之人住處僅依伯也長男馬養後六日寅卯時同處依泊也當土之等見之問來由状知愍養申當國司國司聞見之悲賑給糧小子歎曰從殺生人受苦無量我亦還到彼又駈使猶聿不止殺生之業留淡路國分寺從其寺僧長男逕二月歸來本土妻子見之面目青驚怪之言入海溺死逕七日而爲齋食報恩既畢不思之外何活還來若是夢矣若是固魂矣馬養向妻子具陳先事於是妻子聞之相悲相喜馬養發心厭世入山修法見聞之者無不奇矣海中雖多難而全命存身寔尺迦如來之威徳海中漂人之深信矣現報猶如是況後生報也備債傭賃上音用反下徃反二合知加良豆玖乃比春傭賃知加良川久乃比暴荒也張多与比天桴伊可多桴二合賑日久多女久三天聿川比尓川比側草反徴財也青強非理以徴債取多倍而現得惡死報縁第廿六田中眞人廣忠女者讚岐國美貴郡大領外從六位上小屋縣主宮手之妻也産生八子富貴寶多有馬牛奴婢稻錢田畠等天年無道心慳貪無給與酒加水多沽取多直貸日與小升償日受大升出擧時用小斤償收大斤息利強徴大甚非理或十倍徴或百倍徴債人澁取不爲甘心多人方愁棄家逃他國無逾此甚廣忠女以寶龜七年六月一日臥病床而歴數日故至七月廿日呼集其夫並八男子語夢見状而言閻羅王闕所召而示三種之夢一者三寶物多用不報之罪二者沽酒加多水取多直之罪三者斗升斤兩種用之與他時用七白乞徴時用十二目而收依此罪召汝應得現報今示汝耳傳語夢状即日死亡逕于七日不燒而置請集禪師優婆塞卅二人九日之頃發願修福其七日夕吏甦還之棺蓋自開於是望棺而見甚臭無比自腰上方既成牛額生角長四寸許二手作牛足爪皴似牛足甲自要下方成人形嫌飯草食已裸衣下著臥於糞土東西之人走集怪視頃莫息大領及男女之愧恥威慟五體投地發願無量爲贖罪報三木寺進入家内離種財物東大寺進入牛七十頭馬卅疋治田廿町稻四千束負他人物皆既免之國司郡司見將送解官之比頃經五日而死擧國郡見聞之人唱然懆然不因果非理無義是以定知非理現報無義惡報矣現報猶然況亦誘報乎如經説債物不償作馬牛償云負人如好奴物主如君負人如税物主如鷹唯雖負物而徴非分返作馬牛更役償人故莫過徴通也強債吾万祢皮次力止賃母乃加比乎洽阿万祢支道法也息利伊良之毛乃那里太意止伊土左介天疾皴佐介天澁佐須良不留者也尓介可無二合可无戚惠也患也慟庸病也比傾古呂保比惣志加之那加良喟然歎也唱然那介支懆然愁煩也債皮多流賃髑髏目穴笋獨脱以祈之示靈表縁第廿七白壁天皇世寶龜九年戊午冬十一月下旬備後國葦田郡大山里人品知坂人爲買正月物向同國深津郡於深津市而往中路日晩次葦田郡於葦田竹原所宿之處有呻音言痛目矣故人聞之竟夜不寢而踞明日見之有一髑髏笋生目穴而所串之掲竹解免目所食以饗之言吾令得福到市買物毎買如意疑彼髑髏目祈報恩矣從市還來次同國竹原時彼髑髏及現生形而語之言吾者葦田郡屋穴國郷穴君弟公也賊伯父秋丸所殺是也風吹毎動我目甚痛蒙仁弘慈痛苦既除今飽得慶不忘其恩不勝幸心欲酬仁者恩我父母家有于屋穴國里今月晦夕臻於吾家非彼宵者無由報恩牧人聞之怪不告他人期之晦暮至於彼家靈操牧人之手控入屋内讓所具饌以饗共食所殘皆裹授財物良久彼靈倏忽不現父母爲拜諸靈入其屋裏見牧人而驚問於入來之縁牧人於是如先具述因提秋丸問殺所由如汝先言汝與吾子倶向於市時汝負他物未償其債遇於中路而徴乞之弟公捨而來之若來不也我答汝言未來不視今所聞何違于先語賊盜秋丸惣意慘然不得隱事乃答之言去年十二月下旬爲置無日物我與弟公率往于市所持之物馬布綿鹽路中日晩宿于竹原竊殺弟公而彼物到于深津市馬賣讚岐國人自餘物等今出用之父母聞之嗟呼我愛子爲汝所殺非他賊之間父母之弟如葦蘆之隙故匿内其過失償出不見之外便禮牧人更饗飮食牧人還來以状轉語夫日曝髑髏尚故如是施食報福與恩報恩何況現人豈忘恩乎如涅槃經説受恩報恩者其斯謂之矣笋掲奴支脱取也次宿也竟夜不寢蹲毎蘆遠支隙九左餉丁礼意比可礼伊比動須名波三毛夜母須礼波勝宵夜也晦孝支己毛利乃忽操礼取也控引也讓惣然留也悸然恐也彌勒丈六佛像其頚蟻所嚼示奇異表縁第廿八紀伊國名草郡貴志里有一道場號曰貴志寺其村人等造私之寺故以爲字也白壁天皇代有一優婆塞初夜思疑行路之人得病參宿起巡堂内見堂無人其時有塔木未造淹仆伏而朽疑斯塔靈矣彼病呻音毎夜不息行者不得聞忍故起窺看猶無病人然最誘夜倍於常音響于大地而大痛呻猶疑塔靈也明日早起見堂内其彌勒丈六佛像頚斷落在土大蟻千許集嚼摧其頚行者見之告知檀越等悵復奉造副恭敬供養矣夫聞佛非肉身何有痛病誠知聖心示現雖佛滅後而法身常存常住不易更莫疑之焉求也悵哀也村童戲剋木佛像愚天斫破以現得惡死報縁第廿九紀伊國海部郡仁嗜之濱中村有一愚癡夫姓名未詳也自性愚癡不知因果海鄭與安諦通而往還山有山道號曰玉坂也從濱中指正南而踰到乎秦里當里小子入山拾薪其山道側戲遊木剋以爲佛像累石爲塔以戲剋佛而居石寺時戲遊白壁天皇之世彼愚夫咲戲剋佛以斧殺破棄之而去之不遠擧身躄地從口鼻流血兩目拔女夢忽死諒知護法非無何不恭敬女法花經説若童子戲木及筆或以指爪甲而畫作佛像皆成佛道復擧一手小低頭以此供養佛像成無上道是以愼信矣村童左斗和良波部佐土和良波累沙門積功作佛像臨命終時示異表縁第卅老僧觀規者俗姓三間名干岐也紀伊國名草郡人也自性天年雕巧爲宗有智得業並縁衆才著俗營農蓄養妻子先祖造寺有名草郡能應村名曰彌勒寺字曰能應寺也觀規聖武天皇之代發願雕造尺迦丈六並脇士以白壁天皇世寶龜十年己未奉造既畢居能應寺之金堂以設會供養又發願雕造十一面觀音菩薩木像高十尺許半造未畢小縁歴年之老耄力弱不得自彫爰老僧年以十有餘歳之時長岡宮御宇大八嶋國山部天皇代延暦元年癸亥春二月十一日臥于能應寺而命終焉逕之二日更甦還之召弟子明規言我忘一語不念忍故還來也即令立床敷蓆備食於是請智武藏村主多利丸居床饗食對面共食既畢之即位從坐起引率明規並諸親屬長跪禮於多利丸言觀規少分盡命不畢觀音像而忽率罷命幸逢嘉時盍申所思伏願蒙尊芳慈欲畢聖像寸心之願僅當所望故後生大福被於觀規現報功徳蒙於尊主不勝至誠更參還來奉無禮状悚慄謹白爰多利麿及以明規等悲哭涕涙而答曰請語状我必奉畢沙門聞之起拜歡喜又逕二日至同月十五日召明規言今日當佛般涅槃日余亦命終明規將告見慈儀不勝愛也至詐言而白未及彼日師乞暦見也言今當十五日何我子虚言未及也乞湯洗身易著袈裟跪合掌持香爐燒香向西便日申時命終之矣既而佛師多利麿受遺言造彼十一面觀音像因關白供養已訖今居能應寺之塔本也未替曰嗟呼慶哉三間名干伎之氏大徳内密聖心外現凡形著俗觸色不染戒珠臨沒向西走神示異誠知是聖非凡矣彫惠利雕惠留統須惠多利須部多流盍老耄音毛及老也營農二合蓄席嘉善也規音貴也女人産生石以之爲神而齋縁第卅一美乃國方懸郡水野郷楠見村有一女人姓縣氏也年迄于廿有餘歳不嫁未通而身懷任逕之三年山部天皇世暦元年癸亥春二月下旬産生二石方丈五寸一色青白斑一色專青毎年長有比郡名曰淳見是郡部内有大神名曰伊奈婆託卜者言其産二石是我子因其如家内立忌籬而齋往古今來未都見聞是亦我聖朝奇異事矣産美濃國方縣郡嫁有曰厚見卜者可三那支加美奈岐籬可支齋移孝伊都久往古託用網漁夫値海中難憑願妙見菩薩得全命縁第卅二呉原忌寸名姓丸者大和國高市郡波多里人也自幼作網捕魚爲業延暦二年甲子秋八月十九日應到紀伊國海部郡内於伊波多岐嶋與淡路國之間海下網捕魚入三舟乘有九人忽大風吹破彼三舟八人溺死時名妹丸漂之於海至心歸於妙見菩薩發願而言濟助我命量乎我身作妙見像漂海心如寐無覺皎天覺身在彼部内蚊田浦濱之草上焉唯所濟量於己身作像而敬嗚呼異哉遇風破舟撃波亡人單唯一在况身作像定知妙見大助漂者信力也憑怙也依也漁魚取浦取也呉礼量恕判加利弖怒刑罰賎沙彌乞食以現得頓惡死報縁第卅三紀直吉足者紀伊國日高郡別里椅家長公也天骨惡性不信因果延暦四年乙丑夏五月國司巡行部内給於正税至于其郡下乎正税而班百姓有一自度字曰伊勢沙彌也誦持藥師經十二藥叉神名歴里乞食就於給正税之人乞稻臻於厥凶人之門而乞見彼乞者不施乞物散其荷稻亦剥袈裟而拍通之沙彌逃隱于其別寺僧坊凶人遂捕更將己門擧持大石當沙彌頭而迫之曰讀其十二主叉神名咒縛乎我沙彌猶辭之凶人猶強之不勝強逼一遍讀逃然後不久地而死更不可疑護持加罰雖自度師猶忍心隱身聖人交凡中故炯然無過慇探吹毛不可求疵求失之者三賢十聖有失可誹求徳之者謗法斷善有徳可美所以十輪經云匐花雖萎猶勝諸花破戒諸比丘猶勝諸外道説出家人過若破戒若持戒若有戒若無戒不過若無過説者過出萬億佛身血今此義解云出血不能障佛道説僧過時破懷多人信生彼煩惱障聖道是故菩薩樂求彼失像法決疑經云未來世中俗官莫令使比丘輸税若税舊者得罪無量一切俗人不得乘騎三寶牛馬不得打三寶奴婢及以六畜不得受其三寶奴婢禮拜若有犯者皆得犯咎云又如經論説慳心多者雖是泥土重於金玉貪之人聞乞糞土猶懷惜財不布施藏積恐人知捨身空平去餓鬼中受飢寒心夫錢財者五家共有何五家者一縣官非理來向二者盜賊猶來劫舊三者忽爲水漂流四者忽然火起不免焚燒五者惡子無理費用其故菩薩歡喜布施也班世滿三持阿可袮皮利炯然移知臻伊知之呂之打也疵苫音斬也殃空也災也南于波良于波宇南怨病忽嬰身同之受戒行善以現得愈病縁第卅四巨勢呰女者紀伊國名草郡填生里之女也以天平寶字五年辛丑怨病嬰身頚生肉疽如大菰痛苦如切歴年不愈自謂宿業所招非但現報滅罪差病不如行善剃髮受戒著袈裟住其里於大谷堂誦持心經行道爲宗逕十五年行者忠仙來共住堂忠仙見之此病相相惆看病咒護發願言爲愈是病奉讀藥師經金剛般若經各三千卷觀世音經一萬卷觀音三昧經一百卷也歴十四年奉讀藥師經二千五百卷金剛般若經千卷觀世音經二百卷唯千手陀羅尼無間誦之也未滿卷數從受病歳以來逕之廿八年至於延暦六年丁卯冬十一月廿七日之辰時癰疽自然口開流出膿血平復如願也知大乘神咒奇異之力病人行者積功之徳無縁大悲至感之者播於異形無相妙智深信之者呈於明色者其斯謂之矣肉疽惡血肉集也音息反播保度許須呈顯也膿假官勢非理爲政得惡報縁第卅五白壁天皇之世筑紫肥前國松浦郡人火店之氏忽然死而至魔國時王授之不合死期故更敢返還時見之大海之中有如釜地獄其中有如黒桴之物而涌返沈浮出告火君言待耶物白耶即亦誦返沈一復浮而言待物白如是三遍於四之遍言我是遠江國榛原郡人物部古丸也我存世時白米綱丁而經數年佰姓之物非理打徴由某罪報今受此苦願爲我奉寫法花經者脱我之罪大君見聞白黄泉甦還來而具解送於大宰府得解状轉解朝庭不信故大辨官取彼黄泉之事状而繼累經廿年也從四位上菅野朝臣眞道任其官上見彼状以奏山鄭天皇聞之請施皎僧頭而詔之言世間衆生至地獄受苦經廿餘年耶不也僧頭答曰受苦之姓也何以知爾以人間百年爲地獄一日一夜故未免也天皇聞之彈指勅遣使於遠江國令訪古丸之行事方得問之如解状不異不實天皇信悲以延暦十五年三月朔七日始召經師四人爲古麿奉寫法花經一部宛經六萬九千三百八十四文字動率知識擧皇太子大臣百官皆悉加入其知識也天皇勸請善珠大徳爲講師請施皎僧頭爲讀師於平城宮野寺備大法會爲講讀件經贈救彼靈之苦也嗚呼鄙哉古丸用于狐借虎皮之勢非理爲政受惡報者不因果之賎心太甚也非無因果也桴涌返皎僧頭太伊止鄙倭語止比奈留又云賎也倭語云止比奈流可那又云賎也借不滅塔階作寺幢得惡報縁第卅六正一位藤原朝臣永手者諾樂宮御宇白壁天皇御時太政大臣也延暦元年頃大臣之子從四位上家依爲父惡夢見而白父言不知兵士卅餘人來召父尊此惡表相故應謝除雖然白驚而父不應然後父卒時子家依得久病故請召禪優婆塞而令咒護猶不愈差時看病衆中有一禪師發誓願言凡憑佛法修行大意救他活命今我壽施病者代身佛法實有病人命活棄命不手於置燒香行道讀陀羅尼而忽走轉時病者詫言我永手也我令仆乎法花寺幢後西大寺八角塔成四角七層咸五層也由此罪召我於閻羅王闕令抱火柱以挫釘打立我手於而問打拍今閻羅王宮内煙滿王問何煙答曰永手之子家依受病而痛咒之禪師手於燒香彼煙也即閻羅王免我擯返然我體滅無所寄宿故道中漂於是不食病者乞飯而食差病起居夫幢是招轉輪王報之善因也塔是後三世佛舍利之寶藏也故依幢仆得罪由塔高滅被罪也不應不恐是進現報也愈夜須滿須憑恃也怙也怙也清挫弊師擯追差夜須美天於支比託久流比天煙層古之不顧因果作惡受罪報縁第卅七從四位上佐伯宿禰伊太知者平城宮御宇天皇世人也于時京中人下於筑前得病忽死而至閻羅王闕不見於目聞之響太地而所打有人音言痛哉毎打遍問政火言若此人在世時作何功徳善諸史答言唯奉寫法花經一部王言以彼罪宛經卷雖宛卷而罪數倍勝無量無數亦宛經立萬九千三百八十四文字猶罪數倍無救之因時王拍手言如許見之世間衆生作罪受苦未見如此人太甚作罪竊問傍人此所打之人誰也答曰佐伯宿太知也彼死人能聞持纔自黄泉還來見之即甦而後以黄泉之状解大宰府不信其事彼人依使乘船上京還來京中而伊太知卿之役閻羅王闕而陳於受苦之状時妻子等聞之言卒經七日爲彼恩靈修善贈福既畢何圖墮惡苦之耶更奉寫法花經一部恭敬供養追救彼靈奇異事也佐介比天拍如許二合己之羅許曾及帝遠有天如許己良志岐曾波災與善表相先現而後其災善答彼縁第卅八夫善與惡之表相將現之時彼善之表相先兼作物形周行於天下國而歌咏示之時天下國人聞彼歌音出咏傳通也云諾樂樂宮廿五年治天下勝寶應眞聖武太天皇召於大納言之藤原朝臣仲麿而御前居諾之朕子阿陪内親王與道祖親王二人以之令治天下欲云何是語宜受不也仲丸答白甚勝能御語受白之時天皇祈御酒令飮令誓而詔若朕遠勅失之者天地相慓被大汝今可誓時仲丸誓白之若我後世違勅詔之者天神地祇嗔而被太災破身懺命如是令誓酒令飮祷已訖然而後天皇崩之後如彼遠勅語以道祖親王爲儲君其天皇之大后同諾樂宮坐時擧天下國而歌咏言年少失王最失王也破注非綾止呂支彼與志我幾何賣命衰也等波與志我幾何賣命如歌咏然而彼帝姫阿倍天皇並大后御世之天平勝寶九年八月十八日改爲天平寶字元年即年儲君道祖親王從大宮之殿出投居獄殺死並黄文王鹽燒王又氏人等倶殺死又寶字八年十月大炊天皇爲皇后所賊天皇位退於淡路國逼並仲丸等又氏之人倶殺死也彼先擧天下歌詠者此親皇滅表相又同大后坐時擧天下國而歌詠法師等乎裙著侮曾之中要帶薦槌懸彌發時隈卿耶又咏言我之黒見曾比麻多尓宿給人成如是歌咏帝姫阿倍天皇御世之天平神護元年歳次乙巳年始弓削氏僧道鏡法師與皇后同枕交通天下政相攝治天下彼咏歌者是道鏡法師之與皇后同枕交通天下政攝表答也又同大后時咏言正相木本者大徳食肥而立來也如是咏言是當知同時道鏡法師以爲法皇鴨氏僧韻與法師以爲法臣參議而天下政攝表答也又諾樂宮廿五年治天下勝寶應眞大上天皇代擧天下而歌咏言朝日刺豐浦寺西有耶押天耶櫻井尓押天耶押天耶櫻井尓白玉磯著耶吉玉磯著耶押天耶然而者國曾榮我家曾榮耶押天耶如是咏之後帝姫阿陪天皇代神護景雲四年歳次庚戌年八月四日白壁天皇即位同年冬十月一日筑紫國進龜政爲寶龜元年治天下是以當知先歌咏者是白壁天皇治天下表相答也又諾樂宮食國帝姫阿倍天皇代擧國歌咏云大宮直向山部之故痛奈不踐曾土有如是咏而後白壁天皇代天應元年歳次辛酉四月十五日山部天皇即位治天下是以當知先咏歌者是山部天皇治天下先表相答也天下災也周行上女具利下安留支咏有太比朕我也尓久見祈祷有介比幾何伊賣命于加礼牟懸左加礼留隈加己也肥不久礼天韻音爲因反磯師食國上字乎師志山部天皇代延暦三年歳次甲子冬十一月八日乙巳日夜自戌時至于寅時天皇悉動繽紛而飛遷同月十一日戊申天皇早良皇太子自諾樂宮移坐于長岡宮也天皇飛遷者是天皇躰宮表也次年乙丑年秋九月日之夜竟夜月面黒光消失空闇也同月廿三日亥時式部卿正三位藤原朝臣經繼於長岡宮嶋町而爲近衞舍人雄鹿宿禰木積波岐將丸所射死也彼月光失者是種繼卿死亡之表相也同天皇御世延暦六年丁卯秋九月朔四日甲寅酉時僧景戒發漸愧心憂愁嗟言嗚呼恥哉哉生世命活存身無便等流早所引故而結憂網業煩惱之所纏而繼生死馳乎八方以炬生身居于俗家而蓄妻子無養物無菜食無鹽無衣無薪毎萬物也無而思愁之我心不安盡後飢寒夜復飢寒我先世不修布施行鄙哉心微哉我行然而寢之子時夢見乞食者來於景式之家誦經教化云修上品善功徳者得一丈七尺之長身修下品善功徳者得一丈之身爰景戒聞之廻頭而乞人者有紀伊國名草郡内楠見粟村之沙彌鏡日也徐就見之其沙彌前有長二丈許廣一丈許板札於彼札者一丈七尺與一丈印也景戒見之問斯是修上品與下品善功徳人之身印耶答唯然也爰景戒發慚愧心彈指而言修上品下品善者得身長如是有也我先唯不修下品善功徳故我受身唯有五尺餘矣鄙哉彈指悔愁有側之人聞之皆言嗚呼當哉即景戒將炊白米半外許施彼乞者咒願受之立出書卷景戒言此書寫取度人勝書景戒見之女言能書諸教要集也爰景戒愁何無紙乞者沙彌又出本垢授景戒言於斯寫之哉我往他處乞食還來然置札盡而去爰景戒言斯沙彌常非乞食之人何故乞食耶有人答言子數多有無食之物乞食養也夢答未詳唯疑聖示矣沙彌者觀音變化何以故未受具戒名爲沙彌觀音亦爾雖成正覺饒益有情故居因位乞食者普門示卅三身也上品一丈七尺者淨土萬徳也因果也一丈者爲果數圓滿故七尺者爲因數不滿故下品一丈者人天有漏之苦果也發慙愧心彈指恥愁者本有種子加行智行失遠滅前罪長得後善也暫愧世剃除鬢髮披著袈裟彈指者滅罪得福也我受身唯有五尺餘者五尺者五趣因果也餘者不定姓廻心向大也何以故非尺非丈數不定故又爲五道因也白米獻乞者爲得大白牛車發願造佛寫改大乘懃修善因也乞者咒願而受者觀音應所願也授書者新重種子加行人宗智也授本垢者過去時本有善種子之菩提所覆久不現形由修善法後應得故也我往他處乞食還來者往他處乞食者觀音無縁大悲馳法界救有情也還來者景戒所願畢者令得福徳智惠也常非乞食之人者景戒不發願時無所滅也何故乞食者今應所願漸始福來也子有多數者所化衆生也無養之物者無種性衆生令成佛無因也乞食養者得人天種子也又僧景戒夢見事延暦七年戉辰春三月七日乙丑之夜夢見景戒身死之時積薪燒死身爰景戒之魂神立於燒身之邊而見之如意不燒也即白取所燒己身策棠串返燒云教先燒之他人言如我能燒之己身之脚膝節骨臂頭皆所燒斷落也爰景戒之神識出聲而叫有側人耳當口而叫教語遺言彼語言音空不所聞者彼人不答爰景戒惟忖死人之神者無音故我叫語之音不聞也夢答未來唯惟之者若得長命矣若得官位白今已後待夢見答而知之耳然延暦十四年乙亥冬十二月卅日景戒得傳燈位也同天皇平城宮治天下延暦十六年丁丑夏四五兩月頃景戒之室毎夜狐鳴景戒之私造堂狐堀入内佛坐上屎失穢或晝向於屋戸而鳴然經之音廿餘箇日以十二月十七日景戒之死也又十八年己卯十一十二箇月頃景戒之家狐鳴又時也鳴也次來十九年庚辰正月十二日景戒之馬死也又同月廿五日馬死也是以當知災相先兼表後其實災來也然景戒未推軒轅黄亭之陰陽術未得天台智者之甚深解故不知免災之由而受其災不推除災之術而蒙滅愁不應不勤不可不恐也雄鹿世斯賀乎之加難祁支手夜左斯尤也須之寢祢天阿流札不美多數阿滿多坎炊加志志止流可支臂賀悲難失糸土矢麻利那三師自夏牟之轅乎尓反策棠孝支榮裳都波串久寸毛岐智行並具禪師重得人身生國皇之子縁第卅九尺善珠禪師者俗姓跡連也負母之姓而爲跡氏也約時隨母居住大和國山邊郡磯城嶋村得度精懃修學智行雙有皇臣見敬道俗所貴弘法導人以爲行業是以天皇貴其行徳拜任僧正之而彼禪師之右方有大黶也平城宮治天下山部天皇御世延暦十七年之比頃禪師善珠臨命終時依世俗法問飯占時神靈託者言我必宿於日本國王之夫人丹治比孃女之胎將生王子五圖黶著生以知虚實可命終之後延暦十八年之比頃丹治比夫人誕生一王子其右方黶著女先善珠禪師之面黶不失而著生故名號大徳親王然經三年許存世而薨向問飯占時大徳親王之靈託卜者定我是善珠法師也暫間生國王之子耳爲吾燒香供養者矣是故當知善珠大徳重得人身生人王子矣内教言人家者其聊謂矣是亦寄異事矣又伊與國神野郡郷内有山名號石鎚山是即彼山有石槌神之名也其山高而凡夫不得登到但淨行人耳登到而居住昔諾樂官廿五年治天下勝寶應眞聖武太上天皇之御世又同宮九年治天下亭姫阿陪天皇御世彼山有淨行禪師而修行其名爲寂仙菩薩其時世人道俗貴彼淨行故美稱菩薩亭姫天皇御世於九年寶字二年歳次戊戌年寂仙禪師臨命終日而留録文授弟子告之而言自我命終以後暦廿八年之間生於國王之子名爲神野是以當知我寂仙云然歴廿八年而平安宮治天下山部天皇御世延暦五年歳次丙寅年則生於山部天皇子其名爲神野親王今平安宮疏十四介治天下賀美能天皇是也是以定知此聖君也又何以知聖君耶世俗云國皇法人殺罪人者必隨法殺而是天皇者出弘仁年號傳世應殺之人成流罪活彼命以人治也是以知聖君也或人誹謗非聖君何以故此天皇時天下旱有又天災地妖飢饉雖繁多有又養鷹犬取鳥猪鹿是非慈悲心是儀非然食國内物皆國皇之物指針許未私物都無也國皇隨自在之儀也雖百姓敢誹之耶又聖君尭舜之世猶在旱故不可誹之也隨滿尓萬尓我從所聞選口傳儻善録靈奇願以此福施群迷共生西方安樂國矣磯那黶不須閇孃遠三難胎博羅無薨音興死也鎚孝起哦啼左明也美保之遠
