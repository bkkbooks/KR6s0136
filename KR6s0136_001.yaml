  - {type: 'tls:div-end', offset: 9512, content: '', id: KR6s0136_IWA_001-122-h0}
  - {type: 'tls:div-start', offset: 9512, content: '', id: KR6s0136_IWA_001-124-h2, level: 2, head_text: 凶人不敬養房母以現得要死縁第廿三}
