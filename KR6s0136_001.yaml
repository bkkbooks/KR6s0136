  - {type: 'tls:div-end', offset: 11161, content: '', id: KR6s0136_IWA_001-134-h2}
  - {type: 'tls:div-start', offset: 11161, content: '', id: KR6s0136_IWA_001-138-h0, level: 2, head_text: 邪見打破乞食沙彌鉢以現得惡死報縁第廿九}
  - {type: 'tls:head', offset: 11161, content: '', id: KR6s0136_IWA_001-138-h0}
  - {type: 'tls:div-end', offset: 11321, content: '', id: KR6s0136_IWA_001-138-h0}
  - {type: 'tls:div-start', offset: 11321, content: '', id: KR6s0136_IWA_001-140-h0, level: 2, head_text: 非理奪他物爲惡行受報示奇事縁第卅}
  - {type: 'tls:head', offset: 11321, content: '', id: KR6s0136_IWA_001-140-h0}
  - {type: 'tls:div-end', offset: 12199, content: '', id: KR6s0136_IWA_001-140-h0}
  - {type: 'tls:div-start', offset: 12199, content: '', id: KR6s0136_IWA_001-146-h8, level: 2, head_text: 慇懃歸信觀音福分以現得大福徳縁第卅一}
  - {type: 'tls:head', offset: 12199, content: '', id: KR6s0136_IWA_001-146-h8}
  - {type: 'tls:div-end', offset: 12497, content: '', id: KR6s0136_IWA_001-146-h8}
  - {type: 'tls:div-start', offset: 12497, content: '', id: KR6s0136_IWA_001-148-h9, level: 2, head_text: 歸信三寶欽仰衆僧令誦經得現報縁第卅二}
  - {type: 'tls:head', offset: 12497, content: '', id: KR6s0136_IWA_001-148-h9}
  - {type: 'tls:div-end', offset: 12752, content: '', id: KR6s0136_IWA_001-148-h9}
  - {type: 'tls:div-start', offset: 12752, content: '', id: KR6s0136_IWA_001-150-h9, level: 2, head_text: 妻爲死夫建願圖繪像有驗不燒火示異表縁第卅三}
  - {type: 'tls:head', offset: 12752, content: '', id: KR6s0136_IWA_001-150-h9}
  - {type: 'tls:div-end', offset: 12946, content: '', id: KR6s0136_IWA_001-150-h9}
  - {type: 'tls:div-start', offset: 12946, content: '', id: KR6s0136_IWA_001-152-h7, level: 2, head_text: 令盜絹衣歸願妙現菩薩修得其絹衣縁第卅四}
  - {type: 'tls:head', offset: 12946, content: '', id: KR6s0136_IWA_001-152-h7}
  - {type: 'tls:div-end', offset: 13087, content: '', id: KR6s0136_IWA_001-152-h7}
  - {type: 'tls:div-start', offset: 13087, content: '', id: KR6s0136_IWA_001-154-h3, level: 2, head_text: 知識爲四恩作繪佛像有驗示奇表縁第五}
