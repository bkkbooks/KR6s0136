  - {type: 'tls:div-end', offset: 9867, content: '', id: KR6s0136_IWA_001-124-h2}
  - {type: 'tls:div-start', offset: 9867, content: '', id: KR6s0136_IWA_001-126-h9, level: 2, head_text: 凶女不孝養所生母以現得惡死報縁第廿四}
  - {type: 'tls:head', offset: 9867, content: '', id: KR6s0136_IWA_001-126-h9}
  - {type: 'tls:div-end', offset: 10041, content: '', id: KR6s0136_IWA_001-126-h9}
  - {type: 'tls:div-start', offset: 10041, content: '', id: KR6s0136_IWA_001-128-h6, level: 2, head_text: 忠臣小欲知足諸天見感得報示奇事縁第廿五}
