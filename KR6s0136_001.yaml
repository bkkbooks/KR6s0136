  - {type: 'tls:div-end', offset: 9160, content: '', id: KR6s0136_IWA_001-118-h5}
  - {type: 'tls:div-start', offset: 9160, content: '', id: KR6s0136_IWA_001-120-h6, level: 2, head_text: 无慈心而馬負重駄以現得惡報縁第廿一}
  - {type: 'tls:head', offset: 9160, content: '', id: KR6s0136_IWA_001-120-h6}
  - {type: 'tls:div-end', offset: 9287, content: '', id: KR6s0136_IWA_001-120-h6}
  - {type: 'tls:div-start', offset: 9287, content: '', id: KR6s0136_IWA_001-122-h0, level: 2, head_text: 勤求學佛教法利物臨命終時示異表縁第廿二}
