body:
  text: 日本國現報善惡靈異記上卷諾樂右京藥師寺沙門景戒録原夫內經外書傳於日本而興始伐凡有二時皆自百濟國浮來之輕宮御宇譽田天皇代外書來之磯嶋金刺宮御宇欽明天皇代內典之者誹於佛法讀內之者輕於外典愚癡之類懷於迷執匪之傳覯於內外信恐因果唯代天皇或登高山頂起悲住雨庶民或生而高辨兼委未事一聞十訴一言不漏生年草五皇請説大乘經所造經疏長流末代或發弘誓願敬造佛像天隨敞寶藏亦大僧等德十地道超二我秉智燭以照昏岐運慈舟難行苦行名流遠國今時深智人神功二宇測於是諾藥師寺沙世人也方好鄙行翹利卷貪財物過石於舉鐵鐵欲他分惜己物甚流頭於粉粟粒以啖粳或貪寺物償債或誹法僧現身被災或殉道積行而現得驗或深修善以生霑善惡之報如影隨形苦樂之響如谷應音見之者甫驚怪忘一卓之內慚愧之者倏悸怠起避之頂匪惡之狀何以真於曲執而定是非示因果之報何由改於惡心而善道乎昔漢地造冥報記大唐國作般若驗記何唯愼乎他傳録弗信恐乎自土奇事粵起自矚之不得忍寢居心思之不點然故聊注側聞號曰日本國現報善惡靈異記作上中下參卷流季葉然景戒稟性而儒濁意難澄頓井之識久迷太方能巧所雕淺加力恐寒心胎患於傷手此二山之一礫但以口説不詳忘遺多矣不升貪善之至慓示濫之我後生賢者幸勿嗤焉祈覽奇記者却邪入正諸惡莫作諸善奉行御乎左米太万比之乎左女多比之宇阿女乃之太阿米乃之多譽訓呆牟保牟磯訓師城訓紀欽音禁反禁反儔止毛加良皮覯也親見也庶民上字諸也諸也委知也敞開也弊聞也等也康取也燭止毛之比乎止毛之比皮昏暗也岐知末太乎知方多罕難也測太波加利多皮加諾音若也瞰見也鄙止比止奈止比止奈流翹望也尅望也音之反舉去噓須不與利毛須不與毛粉久大支粒川比乎啖波牟與利毛粳犢牛也牛子償乃債毛乃可比乎母乃比乎殉求也霑蒙也祐福也響比支波比支皮甫即也卓失也小天也倏忽也急也悸志呂津古支之古支病也痛也頃間也匪非也不也呈顯也示也非也不也冥音明反點然二合毛太安流己止粵己尓去尓矚見也寢也無己止也無側保乃加尓儒左可之久流都太不季末也葉世也澄須万之雕惠禮流惠貽至也傷曾去奈不尓昆音古尓反礫太比伊之奈利合示善惡表緣卅四五條捉雷緣第一狐為妻令生子緣第二得雷之喜令生子強力在緣第三聖德皇太子示異表緣第四信敬三寶得現報緣第五憑念觀音菩薩得現報緣第六贖龜命放生得現報龜所助緣第七聾者歸敬方廣經典得現報開兩耳緣第八嬰兒鷲所擒他國得逢父緣第九偷用子物作牛役之示異表緣第十自幼時用網捕魚而現得惡報緣第十一人畜所履髑髏救收示靈表而現報緣第十二女人好風聲之行食仙草以現身飛天緣第十三僧憶持心經得現報示奇事緣第十四惡人逼乞食僧而現得惡報緣第十五無慈心剝生兔皮而現得惡報緣第十六遭兵災信敬觀音菩薩像得現報緣第十七憶持法花經得現報示奇異表緣第十八呰讀法花經品之人而現口斜得惡報緣第十九僧用涌湯之分薪而與他作牛役之示奇表緣第草無慈心而馬負重馱以現得惡報緣第草一勤求學佛教弘法利物臨命終時示異表緣第草二凶人不孝養房母以現得惡死報緣第草三凶女不孝養所生母以現得惡死報緣第草四忠臣少欲知足諸天見感得報示奇事緣第草五持戒比丘修淨行而得現奇驗力緣第草六邪見假名沙彌斫塔木得惡報緣第草七修持孔雀王咒法得異驗力以現作仙飛天緣第草八邪見打破乞食沙彌鉢以現得惡死報緣第草九非理奪他物為惡行受惡報示奇事緣第卅殷勤歸信觀音願福分以現得大福德緣第卅一歸信三寶欽仰衆僧令誦經得現報緣第卅二妻為死夫建願圖繪像有驗不燒火示異表緣第卅三令盜絹衣歸願妙現菩薩修得其絹衣緣第卅四知識為四恩作繪佛像有驗示奇表緣第卅五捉電緣第一少師部栖輕者泊瀨朝倉宮草三年治天下雄略天皇謂大泊瀨稚武天皇之隨身肺脯侍者矣天皇住磐余宮之時天皇與后寐天安殿婚合之時栖輕而詔汝鳴雷奉請之恥答白將請天皇詔言爾汝奉請栖輕奉敕從宮罷出緋縵著額赤幡桙乘馬從阿倍山田前之道與豐浦寺前之路走往至于栖輕諸越之衢叫囁請言天鳴電神天皇奉請呼云然而自此還馬走言雖電神而何故不聞天皇之請耶走還時浦豐寺與飯岡鳴電落在栖輕見之呼神司入輿篭而持向於大宮奏天皇言電神奉請時電放光明天皇見之恐偉進幣帛令返落處者今呼電岡在古京少治田宮之北者然後時栖輕卒也天皇敕留七日七夜詠彼忠信電落同處作彼墓永立碑文柱言取電栖輕之墓也此電惡怨而鳴落踊踐於碑文柱彼柱之析間電所捕天皇聞之放電不死雷慌七日七夜留在天皇敕使樹碑文柱言生之死之捕電栖輕之墓也所謂古時名為電岡語本是也肺脯上音之反訓支毛下普音反訓伊上音之肝也下音布訓伊也寐你天你弖婚合上音古隱反久奈可比二合輟見奴縵可川良緋安介左介天衢知万太輿去之舉去之可介利偉大波之多皮之久幣帛上音弊反下音百反二合彌天久良弊帛踊久惠波左万利天搆慌保禮天樹立也狐為妻令生子緣第二昔欽明天皇是磯城嶋金刺宮食國天國押開廣庭也御世三乃國大乃郡人應為妻覓好娘乘路而行時曠野中遇於妹女其女媚壯馴之壯睇之言何行稚娘答將覓能九而行女也壯亦語言成我妻耶女聽答言即將於家交通相住比頃懷任生一男子時其家犬十二月十五日生子彼犬之子每向家室而期尅睚肯吠家室脅惶告家長此犬打殺雖然患告而猶不殺於二月三月之頃設年米舂時其家室於稻舂女等將充間食入於碓即彼犬將咋家而追吠即驚澡恐成野干登篭上而居家長見言汝與我之中子相生故吾不忘每來相寐故誦夫語而來寐故名為支都禰也時彼妻著紅襴染裳今桃花云裳也而窈窕裳襴引逝也夫視去容戀歌曰古比波未奈加我宇弊邇於知奴多万可支流波呂可邇美江天伊爾師古由惠邇故其令相生子名號岐都彌亦其子姓負直也是人強力多有走疾如鳥飛矣三乃國狐直等根本是也娘乎見奈奈乎你媚古比馴奈川支奈岐睇米加利宇都又云米見須女又云期尅二合伊乃古不去不睚尓良牟胥如上又云波尓加美又云伊支美胥波尓加美又云伊岐美食國二合久尓乎之之倉國久乎尓師吠二合保由喚吠二合保由家室二合伊乃止二合伊戶乃止之脅於比江於地淙寐你支襴須曾窈窕上音要反下音調反二合佐備窕窈二合佐比得電之喜令生子強力在緣第三昔敏達天皇是磐余語田宮國停名倉玉敷命也御世尾張國阿育知郡片里有一農夫作田水之時少細降雨故隱木本金杖而立時電鳴即恐驚金杖而立即電墮於彼人前成小子而其人持金杖將撞時電言莫害我報汝之恩其人問言汝何報電答之言寄於汝令胎子而報故為我作楠船入水泛竹葉而賜即如電言作備而與時電言莫近依令遠避即即愛霧登天然後所産兒之頭纏蛇二遍道尾乘後而生年十有餘頃聞之朝庭有力人念誠之來於大宮邊居爾有臨時王力秀當時住大宮東北角之於別院彼東北角有方八尺石王力王自住家出取其石而投即入住處閉門他人不令出入少子視念名聞力人者是也夜不見人取其石而投益一尺力王見之手拍攢取石而投從常不得投益小子亦二尺投益王見之二投猶不得益少子立投石處小子之迹深三寸踐入其石亦三尺投益王見迹念是居小子之投石將投而依即少子逃王追少子逃王追少子通墻而逃少子亦返王踰墻上而追自通亦通而外走力王修不得投念自我益力更不追然後少子作於元興寺之童子時其寺鐘堂夜別死彼童子見白衆僧言我止此死災衆僧聽許童子鐘堂之四置四燈覆益然於鐘堂戶本居鬼半佇童子而視之退鬼亦後夜時來入即投鬼頭髮而別引鬼者外引童子內引彼儲四人慌迷蓋不得開童子四角別引鬼而依開燈蓋至于晨朝寺鬼已頭髮所引剝而逃明日尋彼鬼血而求往至於其寺惡奴埋立衢即知彼惡奴之靈鬼也頭髮者今在元興寺為也然後其童子作優婆塞猶住元興寺其寺作田引水諸王等妨不入水田燒之時優婆塞言吾引田水衆僧聽之故十人可荷作鋤柄便持之也優婆塞持彼鋤柄撞杖而往立水門水口居諸等鋤柄引棄塞水門口而不入寺田優波塞亦取百餘引石塞於水門入於寺田王等恐乎優婆塞之力而終不犯故寺田不得而能得之故寺衆僧聽令得度出家名號道場法師後世人傳謂元興寺道場法師強力多有是當是如誠先世強修能緣所感之力也是日本國奇事矣喜牟我去備牟加之比譯語二合乎佐二合伊佐食國二合久尓乎數倉國二合久尓乎主渟沼也停泥也太布止不止和農夫二合多都久留乎乃去少細二合古佐女小細二合都久久毛流靉誡己呂美試拍天乎知拍攢太乎你天踐不美童和良波善蓋不太聖德皇太子示異表緣第四聖德皇太子者磐余池邊雙欟宮御宇橘豐日天皇之子也小墾田宮御宇天皇伐立之為皇太有三名一號曰廄戶豐聰耳二號曰聖德三號曰曰上宮也向廄戶産故曰廄戶天年生知十人一時訟白之然一言不漏能聞之別故曰豐聰耳進止威儀似僧而行加製勝法花等經疏弘法利物定孝績功動之階故曰聖德從天皇宮住上故曰上宮皇也皇太子居住于鵤岡本宮時有緣出宮遊觀幸行片岡村之路側有毛乞匂人得病而臥太子見從輿下俱語之間訊脫所著衣覆於病人而幸行也遊觀既訖返輿幸行脫覆之衣挂于木枝無彼乞匂太子取衣著衣有臣白曰觸於賎人而穢衣何乏更著之太子詔住矣汝不知之也後乞匂人他處而太子聞之遣使以殯岡本時寺東北角有守部山作墓而收名曰八木墓也後遣使著墓口不開無之入人唯作歌書以立墓戶歌言伊可流可乃三乃乎可波乃太紅波己曾和可於保支見乃三奈和數良禮女使還狀白太子聞之然不言誠知聖人知聖凡人不知凡夫之肉眼見賎人聖人之通眼見隱身斯奇異之事又藉法師之弟圀勢師者百濟國之師也住於日本國大倭國葛木高宮寺時法師而北坊名號願覺也其師常明旦出行里夕以來入於坊居以為常業時圓勢師弟子之優婆塞見之白師言莫言默然優婆塞竊穿坊壁而竊之者其室內放光照優婆塞見之復白師答之言然有故我諌汝莫言然後願覺然命終時圓勢師告弟子優婆塞言葬燒收即奉師告而燒收訖然後復其優婆塞住於近江時江有人言於是有願覺師即優婆塞往而見當實願覺師也逢於優婆塞而談之言比頃不諸戀思無間起居不安也當知是聖反化也食五辛者佛法中制而聖人用食之者無所得罪耳磐余二合伊波你乃二合伊波禮乃雙欟奈見川支乃雙槻二合奈你死乃聰止之刀制作也績音赤也鵤伊加留加輿見己之乞下音可太乃又云時反二合保可比止二合又云保甘比止奇米川良之久又云之久女又阿也支藝美罪機比頃二合己乃己呂藹津加飛乃津良數之天謁万穿惠利天又云宇可知天窺宇加波皮佳信敬三寶得現報緣第五大花位大部屋栖野古連公者紀伊國名草郡宇治大伴連等先祖也天年澄情重尊三寶案本記曰敏達天皇之代和泉國海中有樂器之音聲如笛箏琴箜篌等聲或如雷振動晝鳴夜耀指東與流大部屋栖古連聞奏天皇然不信更奏皇后聞之詔連公曰汝往者之奏詔往看實如聞有當霹靂之楠矣還上奏之泊乎高腳濱今屋栖伏願應造佛像焉皇后詔宜依所願也連公奉詔大喜告嶋大臣以傳詔命大臣亦喜請池邊直氷用雕佛造菩薩三軀像居于豐補堂以諸人仰敬然物部弓削守屋大連公奏皇后曰凡佛像不可置國內猶遠退皇后聞之詔居栖古連公曰疾隱此佛像連公奏詔使氷用直藏乎稻中矣弓削大連公放火燒道場將佛像流難破堀江徴於屋栖古言今國家起災者依鄰國客神像置於己國內可出期客神像速忽流守豐國也客神弗神像也固辭不出焉弓削大連狂心起逆謀傾窺使受亦嫌之地復之當於用明天皇母而挫弓削大連則出佛像以傳後世命安置吉竊寺而放光阿彌陀之像是也皇后癸丑年春正月即位小墾田宮卅六年御宇矣元年夏四月庚牛朔己卯立廄戶皇子為皇太子即以屋栖古連公為太子之肺脯侍者天皇代二年乙丑夏五月甲寅朔戊午敕屋栖古連公曰汝之功者長遠不忘賜大信位十七年己巳春二月皇太子詔連公而遣播磨國保郡內二百七十三町五段餘水田之司也草九年辛巳春二月皇太子命薨于斑鳩宮屋栖古連公為其欲之出家天皇不聽八年甲申夏四月有一大僧執斧毆父連公見之直奏之白僧尼應中置上尼扎惡使斷是非天皇敕之曰諾也連公奉敕而之僧八百卅七人尼五百七十九人也以觀勒僧為大僧正以大信屋栖古連公與安草部德積為僧都卅三年乙酉冬十二月八日連公居住難破而忽卒之尸有異香而馥矣天皇敕之七日使留永於彼忠徑之三日乃蘇蘇矣語妻曰有五色雲如電如度北自而往其雲道芳如雜名香觀之道頭有黃金山即到面受苑聖德皇太子侍立共登山頂其金山頂居一比丘太子敬禮而曰是東宮童矣自今已後徑之八日應逢銛願仙藥比丘環午解一玉授之含天眼而作是言南無妙德菩薩令三遍誦禮自彼罷下皇太子言速還家除作佛處我悔過畢還宮作然投先道還即見驚蘇也時人名曰還活連公孝德天皇世六年庚戌九月賜大花上位也春秋九十有餘而卒矣贊曰善哉大部氏貴仙儻法澄情效忠命福共存徑世無夭武振萬機孝繼子孫諒委三寶驗德善神加護也今惟推之徑之八日逢銛鋒者當宗我入鹿之亂也八日者八年也妙德菩薩者文殊師利菩薩也令服一玉者令免難之藥也黃金山者五臺山也東宮者日本國也還宮作佛者勝寶應真聖武大上天皇生于日本國作寺作佛也爾恃並住行基大德者文殊師利菩薩反化也是奇異事矣霹靂上音百反下音歷反字二合可美止利乃支二合可美止支乃楠久須乃支腳安之乎利堀呆利徴破多牟天利天介止傾窺宇可不嫌曾你見挫止利比太支川止利比多支利揖音伊不薨音興反花也死也斑鳩二字毆太加不打也諾字奈利加奈利安草音安反鞍安也卒死也馥上音分下音服乎禮利粉馥二合詠之乃波之牟蘇左女太米蘇伊支太利霓尓之電尓加也久爰己尓童和波奈利銛止支鐶太万支乃環支乃鋒左支吞乃見罷万可利儻加多知波比償加太知波比存持也夭憑憑念觀音菩薩得現報緣第六老師行善者俗姓堅部氏小治田宮御宇天皇之代遣學高麗遭其國破流離而行忽其何邊椅攘無船過渡無由居斷橋心念觀音即時老翁乘舟迎同載共渡竟之後從舟下道老公不見其舟忽失乃疑觀音應化也便發誓願造像恭敬遂其大唐即造其像日夜歸敬號曰河邊法師之性忍辱過人唐皇所重從日本國使以養老二年歸向本朝住興福寺供養其像卒不息誠知觀音威力難思議矣讚曰老師遠學遭難將歸無由濟渡憶聖椅上憑威化翁來資別翳圖儀常禮其役不輟憑怙也依也依也資助也忽也翳可久禮奴輟止也贖龜命放生得現報龜所助緣第七禪師弘濟者百濟國人也當百濟亂時備後三谷郡大領之先祖為救百濟遺運旅時發誓願言若平還卒為諸神祇造立伽藍遂免災難即請禪師相共還來造三谷寺其禪師所以造立伽藍多諸寺道俗觀之共為欽敬禪師為造尊像上京賣財既買得金丹等物還到難破之津時海邊人賣大龜四口禪師勸人買而放之即借人舟將童子二人共乘度海日晚夜深舟人起欲行到備前骨嶋之邊取童子等擲人海中然後告禪師云應入入海師雖教化賊猶不許於發願而入海中水及腰時以石當腳其曉見之龜負之矣其備中海浦海邊其龜三領而去疑是放龜報恩乎于時賎等六人其寺賣金丹檀越先過量價禪師後出見之賎等然不知退進禪師憐愍不加刑罰造佛嚴塔供養已了後住海邊化來人春秋八十有餘而卒畜生猶不忘恩返報恩何況義人而忘恩乎贖阿可比天阿加女弖然上音乎反訓二合急也運米久流晚久禮聾者歸敬方廣經典得報聞兩耳緣第八少墾田宮御宇天皇代有衣縫伴造義通義者忽得重病兩耳並聾惡瘡遍身歷年不愈自謂宿業所招非但現報長生為人所厭不如行善遄死乃地餝堂屈請義禪師先潔其身香水澡浴依方廣經於是發希有想白禪師言今我片耳聞一菩薩名故唯願大德忍勞後位禪師重拜片耳既開義通歎喜亦請重更拜兩耳開遐近聞者莫不驚怪是知感應之道諒不虛矣聾見之比太留縫奴比乃比乃澡浴二加波安見天加波阿你弖加尓嬰兒鷲所擒他國得逢父緣第九飛鳥川原板葺宮御宇天皇之世癸卯年春三月頃但馬國七美郡山里人家有嬰兒女中庭匍匐鷲擒騰指東而父母墾惻哭悲追求不知所到故為修福徑八箇年以難破長柄豐前宮御宇天皇之世庚戌年秋八月下旬鷲擒子父有緣事至於丹波後國加作郡部內宿于他家其家童女汲趣井宿人洪足副往見之二村童女集井汲水而奪家童女之井惜不令奪其村童女等皆同心凌蔑之曰汝鷲殘何故無禮罵厭而打所指哭歸家主待問汝何故哭宿人如見具陳事即問所以彼拍罵曰鷲殘也家主答言其年其月日之時余登于捕鳩之而居鷲擒嬰兒從西方而來落巢養雛嬰兒慓啼彼雛望之驚恐不啄余聞啼音自巢取下育女子是也所擒之年月日時之當今語明知我兒爾父悲哭具告知於鷲擒之事主人知實應語許噫乎彼父邂逅次於有兒之家遂得是乎誠知天哀所資父子深緣也是奇異之事矣嬰兒三止利古嬰你止禾古擒取也葺不支乃匍匐上音布反下音福反二合波良波不匍波良波不騰安可利天指左頁波布奴又云加介利奴波不利又云加介利伊久懇阿可良之比天惻你太美童女二合女乃和波汲久牟奪有波不井津井乎凌之乃支綾蔑安奈都利天食也罵乃利壓於曾飛於曾比拍宇太禮天于多禮弖巢須尓捕取也雛比奈乃古尓比尓慓恐也啄津支波万頁喙支邂逅上音解反下后反二合太万左加尓啼哭也次宿也明也偷用子物作牛役之示異表緣第十大和國添上郡山村中里有昔云椋家長公當十二月依方廣經欲懺先罪告使人云應請一禪師其使人問曰何等師答曰不擇其寺隨遇而請其使隨願請得路行一僧歸家主住心供養其夜禮經已訖僧將息時檀主設以破覆之僧即心念明日得物不如取被而出時有聲而言莫盜其被僧大驚疑顧窺家中覓人唯有一牛立家倉下僧進牛邊語言吾者此家長之父也而吾先世為欲與人不告子取稻十束所以今受牛身而償先債汝是出家何輒盜被乎欲其事虛實為我設人座我當上居應知其父於是僧即大愧還止宿處朝事行既訖之曰令他人遠却然後召集親族具陳先事檀越即起悲心而就牛邊敷藁白言實吾父者就此座牛屈膝而臥座上諸親出聲大啼泣言實吾父矣便起禮拜而曰牛言先時所用今咸奉免牛聞之流淚大息即日申時命終然後以覆被及財物而施其師更為其父廣修功德果之理豈不信哉添曾布被不須万自幼時用網捕魚而現得惡報緣第十一幡磨國餝磨郡濃於寺京元興寺沙門慈應大德因越請夏安居講法花經時寺邊有漁夫自幼迄長以網為業後時匍匐家內桑林之中揚聲叫號曰炎火迫身親屬欲救其人唱言莫近我頓欲燒于時其親詣寺請求行者行者咒時良久乃免其著袴燒漁夫悚栗詣濃於寺於大中懺罪愍施衣服等令誦經竟從此以後不復行惡如顏氏家訓云昔江陵劉氏以賣羹為業後生一兒頭具是自頚以下方為人身者其斯之矣漁夫二合魚取男漠夫取莫男也袴波加末迄至也劉音利于反奈加天羹阿川毛乃人畜所履髑髏救收示靈表而現緣第十二高麗學生道登者惠滿之家而往大二年丙午營宇治椅于奈良山溪為人畜所履法師悲之令從者過俗者萬呂而過之其人語之曰蒙大德之慈頂得平安之慶然非今夜無由報恩輒將萬呂乎于其家從閉屋而入於屋裏多設飮食其中以下分之饌與萬呂共會其於後夜有男聲告萬呂曰殺吾之兄欲來故早去萬侶怪而問之答昔吾與兄行交易吾得銀四十斤許時兄始忌殺吾取銀自爾以還多年歲往來人畜皆踏我頭大德垂慈令見離苦故不忘汝恩今宵報耳時其母與長子為拜諸靈入其屋內見萬侶而驚裏問其所以到來萬侶於是説前事母罵長子曰呼矣我愛子為供所殺非他賊也使禮萬侶更設飮食萬侶還來然自師夫死靈白骨尚猶如此何況生人豈忘思哉履不万髑髏上音毒反下音樓反比止加之良營作也溪佐波尓左尓畜介毛乃尓晦川支己毛利頃己乃己呂裏內也饌與久良毛與不久良比毛妬忌二合宇良見二合于良女人好風聲之行食仙草以現身飛天緣第十三大倭國宇太郡漆部里有風流女是即彼部內漆部造麿之妾也年風聲為行自悟鹽醬存心七子産生極窮無食養子便無衣綴勝日沐浴潔身著綴每臨於野採草為事常住於家淨為採菜調盛唱子端坐含笑馴言到敬而食常以是行為身心業彼氣調憐如天上客是難破長柄豐前宮時甲寅年其風流事神仙應春野採菜食於仙草飛於天誠知不修佛法而好風流仙藥應如精進女問經云居住俗家端心掃庭得五功德者其斯謂之矣風流二合美佐乎風聲三左乎鹽醬二合末佐奈己止乎万奈去止乎憐安太加太毛憐風氣調三佐乎彌佐乎端坐支三乎奈久弖僧憶持心經得現報示奇事緣第十四釋義覺者本百濟人也其國破時當後岡本宮御宇天皇之代入我住難破百濟寺矣法師身長七尺廣學佛教念誦心般經時有同寺僧慧義獨以夜半出行因見室中光明耀僧乃怪之竊穿紙窺看法師端坐誦經光從口出僧以驚悚明日悔過周告大衆時覺法師語弟子言一夕誦心經一百遍許狀後開目觀其室裏四壁穿通庭中顯見吾於是生希有之想從室而出回院內還來見室壁戶皆閉即外後誦心經開通如前即是心波若經不思議也贊曰大哉釋子多聞弘教閉居誦經心序融達所觀音万止乃見也廓融加與比達至也也惡人逼乞食僧而現得惡報緣第十五昔故京時有一男人不信因果見僧乞食忿而欲繫時僧走入田水追而執之僧不得忍以咒縛之愚顛沛東西狂走僧即遠去不得眄瞻其人有二子欲解父縛使詣僧房觀請禪師問知其狀而不肯行二子勤重拜敬請救父厄其師乃徐行誦觀音品初段竟即得解脫狀後乃發信心回邪入正也逼於比江加之天眄加利見顛沛上音典反下音背反二合云太不流也二合太不禮無滋心剝生兔皮而現得惡報緣第十六大和國有一狀夫鄉里姓名未詳也天骨不仁喜殺生命其人捕兔剝皮放之於野狀後不久之頃毒瘡遍身肌膚爛敗苦病無比終不得愈叫號而死嗚呼現報甚近怒己可仁不無慈悲矣剝波利天波膚可波加波愈伊由己止又云須牟己止恕遭兵災信敬觀音菩薩像得現報緣第十七伊豫國越知郡大領之先祖越智直當為救百濟遣到運之時唐兵所福至其唐國我八人同住洲儻得觀音菩薩像信敬尊重八人同心竊截松木以為一舟奉請其像安置舟上各立誓願念彼觀音爰隨西風直來築紫朝庭聞之召問狀天皇忽矜令中所樂於是越智直言立郡欲仕天皇許可然後建郡造寺即置其像自時迄乎今世子孫相續歸敬蓋是觀音之力信心至之丁蘭木母猶現生相尚應況是菩薩而不應乎儻多牟良止之天截支利天憶持法花經現報示奇表第十八昔大和國葛木上郡有一持經人舟治比之氏也其生知年八歲以前誦持法花經意唯一字不得存至于草有餘歲猶難得持因觀音以悔過于時夢見有人曰汝昔先身生在伊豫國別郡日下部猴之子時汝奉誦法花經而燈燒一文不得誦今往見之從夢醒驚而思怪之自其親曰忽緣事欲往伊豫二親聽許然咨往當到之猴家叩門喚人乃女人出含笑還人白家母門在客人憐似死郎聞之出見猶疑死子家長見之亦怪問之仁者何人答陳國郡之名客人亦問之答具告知彼姓名也明知是我先父母即長跪拜猴愛之喚入居床而瞻言若死昔我子之靈矣客人具述夢狀謂翁姥五先父母猴亦語因而示之曰我先子號某其子住堂讀經及以持水瓶是也先子聞之入堂內取彼法花經開見之當不所誦之文燈燒失也于時懺奉直之後就然得持於是祖子相見一怪一喜父子之義不失孝養贊曰善哉日下部之氏讀經求道過現二生重誦本經現孝二之美名傳後是聖非凡誠知法花威神觀音驗力善惡因果經云欲知過去因見其現在果欲知未來報見其現在業者其斯謂之矣生知二合有末禮奈加猴佐留醒左無疑奴也長跪二合比左末川支天翁於保知姥於保波呰讀法花經品之人而現口斜得惡報緣第十九昔山背國有一目鹿姓名未詳也常作碁為宗沙彌與白衣俱作碁時乞者來讀法花經品而乞物沙彌聞之輕笑呰故己口訛音效讀白衣聞之碁條恐曰畏恐矣白衣者作碁每遍而勝沙彌者每遍猶負於是即坐沙彌口斜令樂治療終不直法花經云若有輕笑之者當世牙齒疏缺醜辱平鼻手腳繚戻眼目角者其斯之矣寧託惡鬼雖多監言而與持經者不可誹謗能護口業矣呰阿佐毛故己止左良二毛刀良奈之天波天毛碁五反效万尓比負保頁斜上音過反下耶反二合由加三天二合疏於呂曾可尓繚戻上禮于反下來反二合毛止利天角下七反二合須可尓僧用涌湯之薪而他作牛役之示奇表緣第草釋惠勝者延興寺之沙門也法師平生時涌湯分薪束與他而死其寺有一而生犢子長大之後駕車載薪無憩所驅控車入寺知僧在寺門曰惠勝法師者涅槃經雖能讀而不能引車牛聞流淚長息忽而死將牛之今其僧言汝咒牛殺捉之申宮將門狀請僧見之面姿奇貴身體妙而添宴居於淨屋召請繪師言如彼法師之容不誤繪之持來等奉詔持進之於宮見之皆觀音菩薩像也彼師忽然不觀焉諒委觀音所示更不應疑寧所迫飢雖食沙土謹不用食常住僧物所以大方等經云四重五逆我亦能救盜僧物者我所不救者其斯謂之矣取也女牛于犢牛子憩伊己不己止伊古不止云控引也咒乃呂比天乃呂不姿加保有留和之久添宴上依尓反下目反二合比曾加尓之天繪音惠反迫世女無慈心而馬負重馱以現得惡報緣第草一昔河內國有菰敗之人名別也過馬之力而負重荷馬不得往時瞋恚捶驅負重荷勞之兩目出淚賣菰竟者即殺其馬如是殺之為多遍後石別自才臨涌金兩目於釜所現報甚近應信因果雖見畜生而我過去父母六道四生我所生家故不可無慈悲也捶打也驅於飛川加才比太勤求學佛教法利物臨命終時示異表緣第草二故道照法師者船氏河內國人也奉敕求佛法於大唐遇玄三藏而為弟子三藏語弟子曰是人還更將化多人汝等莫輕可能供給業成之後致此直造禪院寺而止住焉時利珠無知鑒恆耀遍遊諸方弘法化物遂住禪院為諸弟子演暢所請衆經要義臨命終時洗浴易衣向西端坐光明遍室于時開目召弟子知調汝見光不答言已法師誡曰勿妄宣傳即後夜光自房出耀寺庭松樹良久乃光指西飛行弟子等莫不驚怪大德西圍端座應卒焉定知必生極樂淨土贊曰氏明德遠求法藏是聖非凡沒放光鑒照也誡加太米弖凶人不敬養房母以現得要死緣第草三大和國添上郡有一凶也其未詳字曰瞻保是難破宮御宇天皇之代類學生之人也往學書傳不養其母貸子稻無物可償瞻保忽怒逼徴之時母居地子坐朝床賓明視之不得寧居賓明語之曰善人何為違孝或人奉為父母建立塔造佛寫經屈請衆僧令行居汝家饒財貸稻多吉何違學覆不孝親母瞻保伏不曰無用也于時衆人代其母而償咸俱起而疾避母出其房而悲泣之曰吾之育汝日夜無憩觀他子之報恩持吾兒之如斯而反見近辱願心違謬矣汝也徴負稻吾亦徴乳直母子之道絶於今日天知地知悲哉痛瞻保於是不言而起入於屋裏拾出舉炎於其庭中皆已燒滅然後入山迷惑不知所為亂髮身復東西狂走復還行路不住己家三日之後忽然火起內外屋倉一時皆焚遂使其妻子等不能生活瞻保無憑餓寒而死現報不遠豈不信乎所以經云不孝衆生必墮地獄孝養父母往生淨土是如來之所説大乘之誠言矣房上音尓反二合知夫佐凶女不孝養所生母以現得惡死報緣第草四故京有一凶婦姓名未詳也曾無孝心愛其母當齋日不炊飯思念齋食便就女邊而乞飯其女今日家長與我亦將齋食除此以外無餘供母時其有稚子携之還家俯視道頭有遺裹飯捨之慰餓猶勞寢室夜半之後有人來扣戶曰汝高叫吾胸有釘方將垂死往可看母以疲寢不得往活其女終死不復相見也不孝養而死從此者不如讓分供母而死耶詳明也俯伏也又即也伏也裹津三寢你太利忠臣小欲知足諸天見感得報示奇事緣第草五故中納言從三位大神高市萬侶卿者大后天皇時忠臣也有記云朱鳥七年壬辰二月詔諸司當三月三將幸行伊勢宜知此意而設備焉時中納言恐妨農務上表立諌天皇不從猶將幸行於是脫其蟬冠朝庭亦重諌之方今農節不可行也或遭早災時使塞己田口水施百姓田施水既窮諸天感應龍神除雨唯樹卿田不落地堯雲更靄雨還霈諒是忠信之至德儀之大贊曰修神氏幼年好學忠而有仁潔以無濁臨民流惠施水塞田甘雨時除美譽長傳蟬奈波世比奈波美靄久毛利音受反田反霈曾久諒己止尓持戒比丘修淨行而得現奇驗力第草六大皇后天皇之代有百濟禪師曰名多羅常住高市郡部內法器山寺勤修看病第一應死人蒙驗更蘇每咒病者奇異取楊枝上枝時六錫杖於錫杖而互用二物不仆如鑿而樹之天皇尊重而常供養諸人歸仰而恆恭敬斯乃修行之功遠流芳名悲之德長存美譽也仆大不禮須鑿乃未樹立也邪見假名沙彌斫塔木得惡報緣第草七石川沙彌者自度無名其俗姓二未詳所以號石川沙彌者以其婦河內國石川郡人也其雖假容於沙彌而繫心於賊盜或誰稱造塔乞人之財物退與其婦置雜物而之或住攝津國嶋下舂米寺折燒塔柱法誰人莫過斯甚終到嶋下郡味木里忽得病聲叫言熱乎離于地一二尺許衆集見或問曰何故如此叫答云地獄之火來燒我身受苦如此也不可故問即日命終呼哀哉罪報不空何不愼歟涅槃經云若見有人修行善者名見天人修行惡者名見地獄何以故空受報故者其斯謂之矣斫左支音力今反止奈加留修持孔雀王咒法得異驗力以現作仙飛天緣第草八役優婆塞者賀武役公今高賀武朝臣者也大和國葛木上郡茅原村人也生知博學得一仰信三寶以之為業每庶挂五色之雲飛仲虛之外携仙宮之賓遊億載之庭臥伏乎蕊蓋之苑吸於養性之氣所以晚年以四十餘歲更居巖窟被葛餌松沫清水之泉濯欲界之垢修習孔雀之咒法證得奇異之驗術驅使鬼神得之自在唱諸鬼神而催之曰大倭國金峯與葛木峯度椅而通於是神等皆愁藤宮御宇天皇之母葛木峯一語主大神託讒之曰役優婆塞謀將傾天皇敕之遣使投猶因驗力輒不所捕故投其母優婆塞令免母故出來見捕即流之於伊圖嶋之于時身浮海上走如履陸體踞萬丈飛如鳳書隨皇居嶋而行夜往駿河富嶺而修然庶賓斧鉞之誅近朝之邊故伏殺劒之刃上富之見放斯嶼而之間至于三年矣於是乘慈之奇以太寶元年歲次辛丑正月令近天朝之邊遂作仙飛天也吾聖朝之大道照法師奉敕求法往於太唐法師受五百虎請至於新羅有其山中法花經于時虎衆之中有人以倭語舉問也法師問誰役優婆塞法師思之我國聖人自高座下求之無之彼一語主大神者役行者所咒縛至于今也不解脫其示奇表多數而繁故略耳知佛法驗術廣大者歸依之者必登得矣博廣也度也庶你可波久波挂加利天携大川左波太左波蕊音奴伊反花也隨也吸須比晚久禮仁之久尓之窟伊波也餌吞也濯須支催毛與保之天峯大介輒太須久駿主因反氏也音自嶺大介二宥可久禮天斧乎乃鉞万左加利誅罪也刃齒邪見打破乞食沙彌鉢以現得惡死報緣第草九白髮部豬丸者備中國少田郡人也天年邪見不信三寶時有一僧來而乞食豬不施所乞反加逼惱亦破其鉢而遂去之然後即往他鄉道中遭風雨暫奇何倉下覆而厭之誠知現報甚近寧不愼歟也如涅槃經云一切惡行邪見為因者其斯謂之矣大丈論云悲心施一人功德大如地為己施一切得報如芥子救一厄難人勝餘一切施云壓於曾比寄宿也隱也非理奪他物為惡行受報示奇事緣第卅膳臣廣國者豐前國官子郡少領也藤原官御宇天皇之代慶雲二年乙巳秋九月十五日庚申廣國忽死徑之三日戌日申時更蘇之而語之曰使有人一頂髮舉來一少子也伴副往程二驛度許路中有大河度椅之以塗嚴自其椅行至彼方有其諾國向使人曰是何國矣答度南國也其京時有八官人佩兵追往前有金入宮門見有王坐乎黃金之坐王詔廣國曰今召汝者依妻憂申之事即召一女見之昔死妻以鐵釘頂通尻打額通頂以鐵繩縛四枝八人懸舉而將來王問之言汝知是女耶廣國白言實我之妻也復問汝知鞫罪耶答不知問女之答我實知之濱吾而自家出遣故惻厭媚王詔廣國曰汝無罪可還於家然愼以黃泉之事勿忘宣傳若欲見父往於南方往而見之實有我父抱其熱之銅柱而五鐵釘卅七於其身打立以鐵打夙三百段晝三百段夕三百段合百段每日打迫廣國見之悲而言嗚呼可圖之受是苦也父言我受是苦吾子汝知不也我為養妻子故或殺生物或貸八兩綿強倍十兩徴或貸生斤稻而強太斤取或人物強奪取或他妻犯不孝養父母不恭敬師長不奴婢者罵慢如是罪故我身雖少而卅七鐵釘立每九百段鐵鞭打迫之痛哉苦哉何日免吾罪何時得安身也汝忽為我造佛寫經贖罪苦愼莫忘矣我飢七日成大蛇到汝家將入屋房時以杖懸棄又五月五日成赤狗到汝家之時犬而相之唯追打者飢熱還我正月一日成狸入於汝家之時飽供養宍種物是以繼三年之糧我無兄弟上下次第而失理成犬白出汗我必可成赤狗凡布施米一升之報得卅日之糧布施衣服一具之報得一年分衣服令讀經者住東方金宮後隨願生夫造佛菩薩者生西方無量壽淨土放生之者生北方無量淨土一日齋食者得十年之糧乃至見造善惡所受報等出廣國暫徘徊少子出來時乎門入見其少子而長跪禮少子喚廣國將至片方脅門押其門而之將出告曰速往廣國同少子云汝誰之子答欲知我者汝初稚時奉寫觀世音經是也還之焉即見蘇還食廣國至黃泉善惡之報顯録流布也作罪得報之因緣者大乘經如廣説誰不信耶所以經云現在甘露未來鐵丸者其斯謂之矣廣國奉為其父造佛寫經供養三寶報父之恩讀所受罪自此以後回邪趣正程保止於毛之呂支釘久支鞫問也謹也怨也也良比擯也良比有良女之見于良米之美惻你太見你三媚音目反你毛乃忘見太利尓抱有太加之鞭須波惠愼由女狗伊奴尓狸你己你古糧加利天脅和支殷勤歸信觀音福分以現得大福德緣第卅一御手代東人者諾樂宮御宇勝寶應真聖武太上天皇之代入吉野山修法求福徑三年許稱禮觀音名號曰南無銅錢萬貫白米萬石好女多德施時在三位粟田朝之女未通不嫁其娘女於廣瀨之家忽然得病痛苦無由差粟田卿遣使八方令問求禪師優婆塞遇東人而拜請令咒護卿之被咒力病愈乃於東人發愛心終交通也親屬繫之東人閉居女愛心不得忍猶哭戀之不離其邊眷屬量定教乎東人更為夫妻合家財物皆既施與五位曰賜後徑數年其將死于時語其曰今吾垂死有一冀意若聽許不也答曰隨意樂妹語之曰妾被東人之恩猶長不忘欲以之女為東人之妻令乎家裏妹受遺言以己之放與東人令主家財也東人現世被大福德是乃修行驗力觀音威德更不哉二合加己不主加止良之女歸信三寶欽仰衆僧令誦經得現報緣第卅二神龜四年歲次丁卯九月中聖武天皇與群臣獵於添上郡山村之山有鹿走入納見里百姓之家中家人不覺殺而之後天皇聞之遣使捕其人等時男女餘人皆遭其難身單心慓無所憑恃但謂自非三寶神力孰肯掾其重憂流聞大丈六能隨人願仍便使人詣寺誦經又請曰我等參向官寺南門令得親拜更請我等及於詣闕之間欲令鍾聲不從衆僧隨願鳴鍾轉經門合得奉拜既而從使參向於授刀寮禁之即依皇子誕生于時朝庭大賀大赦天下不加刑罰反賜官祿於衆人勸喜無比誠知丈六之威光誦經之功德也保曾女單不留比慓恐也孰惟也肯阿天流聞訓傳也闕見可止尓誕安世末世利妻為死夫建願圖繪像有驗不燒火示異表緣第卅三河內國石川郡八寺有阿彌陀畫像其里人云昔於此寺邊有賢婦名不傳焉其夫將死之日願奉造斯佛像而緣貧未遂多經歲月數終秋拾穗便請畫師親載供養靈情泣悼畫師矜之共同發心繪絢畢因設濟會即買金堂恆為敬禮後盜人放光其堂皆燒唯佛獨存曾無損此乃婦人其咸所祐乎哉贊善哉貞婦追遠報恩迄秋設會誠知其孰炎火雖列尊像不焚上天所祐知復何論悼悼非也矜女久你繪絢上音惠反下旬反敦厚也祐助也令盜絹衣歸願妙現菩薩修得其絹衣緣第卅四紀伊國安諦郡部寺之前昔有一家絹衣十盜人所取憑妙見菩薩祈願之盜絹賣之木市人也七日不滿縫猛風來厥絹纏鹿衣褒指南而往隨主家庭衣得之乃去天賜焉買人轉聞乃知盜衣當頭匪求宴弗動也斯亦奇異事矣絹可止利祈伊乃利倏忽也猛風川牟之加世厥褒舉也當頭川女支天宴二合竊也知識為四恩作繪佛像有驗示奇表緣第五國若江郡遊村中有縛行沙彌尼其姓名未詳住於平群山寺率引知識奉為四恩敬畫像其中圖六道供養之後安置其寺因緣事暫示東西時其尊像為人所盜悲位求之終不得矣更停知識念欲放生行其難破徘徊布婦時見擔篋之在樹上即聞種生物之聲篋中而出疑是畜生類必贖而放之留侍物主良久主來乃其尼等曰此篋中有生物聲吾欲買之故待汝耳篋主對曰非生物也尼乞之而猶不于時市人評曰可開其篋主因然拾篋奔走後開見之像存焉尼等勤喜流淚泣矜曰吾先失斯像日夜奉戀今邂逅遇嗟呼慶哉市人聞之來集稱難尼等歡放生修福遂安本寺道歸敬斯乃奇異之事也結也編也篋安万波古良久二也比支尓煙然二合恐也邂逅上音解下音后太万嗟呼二合阿評波加利天
