  - {type: 'tls:div-end', offset: 10262, content: '', id: KR6s0136_IWA_001-128-h6}
  - {type: 'tls:div-start', offset: 10262, content: '', id: KR6s0136_IWA_001-130-h5, level: 2, head_text: 持戒比丘修淨行而得現奇驗力第廿六}
  - {type: 'tls:head', offset: 10262, content: '', id: KR6s0136_IWA_001-130-h5}
  - {type: 'tls:div-end', offset: 10393, content: '', id: KR6s0136_IWA_001-130-h5}
  - {type: 'tls:div-start', offset: 10393, content: '', id: KR6s0136_IWA_001-132-h0, level: 2, head_text: 邪見假名沙彌斫塔木得惡報縁第廿七}
  - {type: 'tls:head', offset: 10393, content: '', id: KR6s0136_IWA_001-132-h0}
  - {type: 'tls:div-end', offset: 10612, content: '', id: KR6s0136_IWA_001-132-h0}
  - {type: 'tls:div-start', offset: 10612, content: '', id: KR6s0136_IWA_001-134-h2, level: 2, head_text: 修持孔雀王咒法得異驗力以現作仙飛天縁第廿八}
