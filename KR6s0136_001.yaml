  - {type: 'tls:div-start', offset: 7997, content: '', id: KR6s0136_IWA_001-110-h7, level: 2, head_text: 遭兵災信敬觀音菩薩像得現報縁第十七}
  - {type: 'tls:head', offset: 7997, content: '', id: KR6s0136_IWA_001-110-h7}
  - {type: 'tls:div-end', offset: 8189, content: '', id: KR6s0136_IWA_001-110-h7}
  - {type: 'tls:div-start', offset: 8189, content: '', id: KR6s0136_IWA_001-112-h9, level: 2, head_text: 憶持法花經現報示奇表第十八}
  - {type: 'tls:head', offset: 8189, content: '', id: KR6s0136_IWA_001-112-h9}
  - {type: 'tls:div-end', offset: 8626, content: '', id: KR6s0136_IWA_001-112-h9}
  - {type: 'tls:div-start', offset: 8626, content: '', id: KR6s0136_IWA_001-116-h6, level: 2, head_text: 呰讀法花經品之人而現口斜得惡報縁第十九}
  - {type: 'tls:head', offset: 8626, content: '', id: KR6s0136_IWA_001-116-h6}
  - {type: 'tls:div-end', offset: 8868, content: '', id: KR6s0136_IWA_001-116-h6}
  - {type: 'tls:div-start', offset: 8868, content: '', id: KR6s0136_IWA_001-118-h5, level: 2, head_text: 僧用涌湯之薪而他作牛役之示奇表縁第廿}
